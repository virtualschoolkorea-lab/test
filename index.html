<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>헤이청주 - 일정 한눈에 보기</title>
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="헤이청주 📢 교육/체험 링크모음">
    <meta property="og:description" content="청주 및 인근 지역의 교육, 체험, 문화 행사 일정을 한눈에 확인하세요!">
    <meta property="og:image" content="https://heycj.vercel.app/og-image.png"> 

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4CAF50;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #666666;
            --border-color: #e0e0e0;
        }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 500px;
            background-color: var(--bg-color);
            min-height: 100vh;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .sticky-wrapper {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* 🌟 헤더 영역 */
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 15px 16px 4px 16px; 
            display: flex;
            flex-direction: column;
        }
        
        h1 { 
            margin: 0; 
            font-size: 1.5rem; 
            font-weight: 700; 
            text-align: center; 
        }
        .sub-header { 
            font-size: 0.7rem; 
            opacity: 0.85; 
            margin-top: 4px; 
            text-align: center; 
        }
        
        .header-action-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 1px; 
            margin-bottom: 8px; 
        }

        .header-stats {
            display: flex;
            flex-direction: column;
            font-size: 0.7rem;
            line-height: 1.3;
            opacity: 0.95;
        }
        .header-stats span {
            font-weight: 700;
            color: #fff;
            margin-left: 5px;
        }

        .btn-share {
            background: rgba(255, 255, 255, 0.25);
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: background 0.2s;
        }
        .btn-share:hover { background: rgba(255, 255, 255, 0.35); }
        .btn-share svg { width: 14px; height: 14px; fill: currentColor; }

        .notice-container {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 6px;
            padding: 6px 10px;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 500;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .notice-container a {
            color: #fff;
            text-decoration: none;
            transition: opacity 0.3s ease-in-out;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        @media (hover: hover) {
            .notice-container a[href]:hover {
                text-decoration: underline;
            }
        }
        
        .notice-container a:focus, 
        .notice-container a:active {
            text-decoration: none;
            outline: none;
        }

        .search-container {
            padding: 7px 15px;
            background-color: #fff;
            border-bottom: 1px solid var(--border-color);
        }
        .search-input {
            width: 100%;
            padding: 6px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            box-sizing: border-box;
            background-color: #f9f9f9;
            transition: all 0.2s;
        }
        .search-input:focus {
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
        }

        .tabs {
            display: flex;
            background: white;
            border-bottom: 1px solid var(--border-color);
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-sub);
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }
        .tab.active {
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
            font-weight: 700;
        }

        /* 🌟 가로폭 절약을 위해 gap과 padding 미세 조정 */
        .checkbox-group {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 4px; 
            padding: 8px 10px; 
            background: #fafafa;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .checkbox-group::-webkit-scrollbar { display: none; }
        
        .filter-cb { display: none; }
        
        /* 🌟 버튼 여백과 폰트 크기 줄임 */
        .cb-label {
            padding: 3px 8px; 
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 14px;
            font-size: 0.72rem; 
            color: #555;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            white-space: nowrap;
        }
        .filter-cb:checked + .cb-label {
            background: var(--primary-color);
            color: #fff;
            border-color: var(--primary-color);
            font-weight: 700;
            box-shadow: 0 2px 4px rgba(76, 175, 80, 0.3);
        }
        
        .filter-cb:checked + .cb-label.age-label {
            background: #ff9800;
            border-color: #ff9800;
            box-shadow: 0 2px 4px rgba(255, 152, 0, 0.3);
        }

        .content { padding: 15px; }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            border: 1px solid var(--border-color);
            display: block;
            transition: transform 0.2s;
        }
        .card:not(.coming-soon):hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        
        .card.coming-soon {
            position: relative;
            overflow: hidden;
            pointer-events: none; 
            user-select: none;
        }
        .coming-soon-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.4); 
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .coming-soon-stamp {
            color: #fff;
            border: 3px solid #fff;
            padding: 8px 18px;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            transform: rotate(-10deg);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .badges { display: flex; gap: 5px; flex-wrap: wrap; }
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            color: white;
        }
        .badge-loc { background-color: #3498db; }
        .badge-age { background-color: #9b59b6; }
        .badge-free { background-color: #4CAF50; }
        .badge-paid { background-color: #f39c12; }
        .badge-info { background-color: #7f8c8d; }
        .badge-today { background-color: #E53935; } 
        .badge-open { background-color: #ff9800; }  
        .badge-close { background-color: #F06292; } 
        .badge-affiliate { background-color: #673AB7; } 
        
        .title { font-size: 1.05rem; font-weight: 700; margin: 0 0 10px 0; line-height: 1.4; word-break: keep-all; }
        
        .info-row {
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-bottom: 6px;
            display: flex;
            align-items: flex-start;
        }
        .info-label { font-weight: 500; width: 65px; flex-shrink: 0; color: #555; line-height: 1.4; }
        .info-desc { flex: 1; word-break: keep-all; line-height: 1.4; }
        
        .btn-link {
            display: block;
            text-align: center;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 700;
            margin-top: 15px;
            transition: background-color 0.2s;
        }
        .btn-link:hover { background-color: #388E3C; }
        .empty-state { text-align: center; padding: 40px 0; color: #888; font-size: 0.95rem; }
        .loading-state { text-align: center; padding: 40px 0; color: var(--primary-color); font-size: 1rem; font-weight: 700; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sticky-wrapper">
    <header id="app-header">
            <h1>헤이청주 📢 교육/체험 링크모음</h1>
            <div class="sub-header" id="last-updated-text">최근 업데이트: 계산중...</div>
            
            <div class="header-action-row">
                <div class="header-stats">
                    <div>TODAY<span id="count-today">...</span></div>
                    <div>TOTAL<span id="count-total">...</span></div>
                </div>
                
                <button class="btn-share" onclick="sharePage()">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
                    공유하기
                </button>
            </div>
            
            <div class="notice-container">
                <a id="notice-link"></a>
            </div>
        </header>

        <div class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="검색어를 입력하세요 (예: 도서관, 과학)" onkeyup="applyFilters()">
        </div>

        <div class="tabs">
            <div class="tab active" onclick="changeTab(this, 'ongoing')">사전예약 중</div>
            <div class="tab" onclick="changeTab(this, 'always')">상시예약/현장접수</div>
            <div class="tab" onclick="changeTab(this, 'affiliate')">제휴 이벤트</div>
        </div>

        <div class="checkbox-group" id="combined-filter-group">
            </div>
    </div>

    <div class="content" id="list-container">
        <div class="loading-state">데이터를 불러오는 중입니다... ⏳</div>
    </div>
</div>

<script>
    const noticeData = [
        { 
            text: "[⚡내일오픈/마감,긴급정보 실시간 알림 오픈챗 입장하기👆] ", 
            link: "https://open.kakao.com/o/gAUqOrai" 
        },
        { 
            text: "[헤이청주에 ☎️ 협업문의/제안/건의하기] 👆", 
            link: "https://forms.gle/h8KLaLkfsU55aH5T9" 
        },
        { 
            text: "※ 간혹 오타가 발생하므로 신청페이지에서 최종 정보확인하기", 
            link: ""
        }
    ];

    function initNotice() {
        let currentIndex = 0;
        const noticeLink = document.getElementById('notice-link');
        
        function updateNotice() {
            noticeLink.style.opacity = '0';
            
            setTimeout(() => {
                const data = noticeData[currentIndex];
                noticeLink.innerText = data.text;
                
                if (data.link) {
                    noticeLink.href = data.link;
                    noticeLink.target = "_blank";
                    noticeLink.style.cursor = "pointer";
                } else {
                    noticeLink.removeAttribute('href');
                    noticeLink.removeAttribute('target');
                    noticeLink.style.cursor = "default";
                }
                
                noticeLink.style.opacity = '1';
                currentIndex = (currentIndex + 1) % noticeData.length;
            }, 300);
        }

        updateNotice(); 
        setInterval(updateNotice, 4000); 
    }

    function initLastUpdated() {
        const updateElem = document.getElementById('last-updated-text');
        const lm = new Date(document.lastModified);
        const y = lm.getFullYear();
        const m = lm.getMonth() + 1;
        const d = lm.getDate();
        const h = String(lm.getHours()).padStart(2, '0');
        const min = String(lm.getMinutes()).padStart(2, '0');
        updateElem.innerText = `최근 업데이트: ${y}/${m}/${d} ${h}:${min}`;
    }

    async function initVisitCounters() {
        const namespace = 'heycheongju_v1'; 
        
        const kstNow = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Seoul"}));
        const yyyy = kstNow.getFullYear();
        const mm = String(kstNow.getMonth() + 1).padStart(2, '0');
        const dd = String(kstNow.getDate()).padStart(2, '0');
        const todayStr = `${yyyy}${mm}${dd}`; 

        try {
            const resTotal = await fetch(`https://api.counterapi.dev/v1/${namespace}/total/up`);
            const dataTotal = await resTotal.json();
            document.getElementById('count-total').innerText = dataTotal.count;

            const resToday = await fetch(`https://api.counterapi.dev/v1/${namespace}/today_${todayStr}/up`);
            const dataToday = await resToday.json();
            document.getElementById('count-today').innerText = dataToday.count;
        } catch (e) {
            document.getElementById('count-total').innerText = '-';
            document.getElementById('count-today').innerText = '-';
        }
    }

    function sharePage() {
        const shareData = {
            title: '헤이청주 📢 교육/체험 링크모음',
            text: '우리 지역 체험 행사 일정을 한눈에 확인하세요!',
            url: window.location.href
        };
        if (navigator.share) {
            navigator.share(shareData).catch(console.error);
        } else {
            navigator.clipboard.writeText(window.location.href).then(() => alert('링크가 복사되었습니다!'));
        }
    }

    let eventData = [];

    async function fetchEventData() {
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQV-02F-qXwS6yLb_XScKqwYj1N0qImwofY2Pyj2tvwnW0i1tl995_BjOfaVHpayppk6YYhqpdLrpa9/pub?output=csv";
        try {
            const response = await fetch(csvUrl);
            if (!response.ok) throw new Error("네트워크 응답이 올바르지 않습니다.");
            
            const csvText = await response.text();
            eventData = parseCSVToJSON(csvText);
            
            processEventDates(); 
            processEventAges(); 
            generateFilters(); // 🌟 함수명 변경 (지역+연령 동시 생성)
            applyFilters();
        } catch (error) {
            console.error("데이터 로딩 실패:", error);
            document.getElementById('list-container').innerHTML = '<div class="empty-state">행사 정보를 불러오는데 실패했습니다. 새로고침을 해주세요. 😥</div>';
        }
    }

    function parseCSVToJSON(csv) {
        const rows = [];
        let row = [];
        let curr = '';
        let insideQuotes = false;
        
        for (let i = 0; i < csv.length; i++) {
            const char = csv[i];
            const nextChar = csv[i + 1];
            
            if (char === '"' && insideQuotes && nextChar === '"') {
                curr += '"';
                i++;
            } else if (char === '"') {
                insideQuotes = !insideQuotes;
            } else if (char === ',' && !insideQuotes) {
                row.push(curr);
                curr = '';
            } else if ((char === '\n' || (char === '\r' && nextChar === '\n')) && !insideQuotes) {
                row.push(curr);
                rows.push(row);
                row = [];
                curr = '';
                if (char === '\r') i++;
            } else {
                curr += char;
            }
        }
        if (curr !== '' || row.length > 0) {
            row.push(curr);
            rows.push(row);
        }
        
        if (rows.length < 2) return [];
        
        const headers = rows[0].map(h => h.trim());
        const data = [];
        
        for (let i = 1; i < rows.length; i++) {
            if (rows[i].length === 1 && rows[i][0].trim() === '') continue; 
            
            const obj = {};
            for (let j = 0; j < headers.length; j++) {
                if (headers[j]) {
                    obj[headers[j]] = rows[i][j] ? rows[i][j].trim() : '';
                }
            }
            if (obj.type || obj.title) data.push(obj);
        }
        return data;
    }

    function processEventDates() {
        const today = new Date();
        const tomorrow = new Date(today);
        tomorrow.setDate(tomorrow.getDate() + 1);
        
        const todayStr = `${today.getMonth() + 1}/${today.getDate()}`;     
        const tomorrowStr = `${tomorrow.getMonth() + 1}/${tomorrow.getDate()}`; 

        eventData.forEach(item => {
            if (item.type === 'affiliate' || item.type === 'always') {
                item.displayText = item.applyNote;
                return;
            }

            item.isTodayClose = false;
            item.isTomorrowOpen = false;
            item.isTomorrowClose = false;

            if (item.applyEnd && item.applyEnd.includes(todayStr)) item.isTodayClose = true;
            if (item.applyStart && item.applyStart.includes(tomorrowStr)) item.isTomorrowOpen = true;
            if (item.applyEnd && item.applyEnd.includes(tomorrowStr)) item.isTomorrowClose = true;

            let text = '';
            if (item.applyStart && item.applyEnd) {
                text = `${item.applyStart} ~ ${item.applyEnd}`;
            } else if (item.applyStart) {
                text = `${item.applyStart} 오픈`;
            } else if (item.applyEnd) {
                text = `~ ${item.applyEnd}`;
            }

            if (item.applyNote) {
                if (text) text += ` <span style="font-weight:700; font-size:0.8rem;">[${item.applyNote}]</span>`;
                else text = `<span style="font-weight:700;">${item.applyNote}</span>`;
            }
            item.displayText = text || '상시 접수';
        });
    }

    function processEventAges() {
        eventData.forEach(item => {
            const mapped = new Set();
            
            if (item.ageFilter && item.ageFilter.trim() !== '') {
                const filters = item.ageFilter.split(',');
                filters.forEach(f => {
                    const cleanF = f.trim(); 
                    if (cleanF) mapped.add(cleanF);
                });
            }
            
            if (mapped.size === 0) {
                mapped.add('미취학').add('초등').add('중고등').add('성인');
            }
            
            item.mappedAges = Array.from(mapped);
        });
    }

    // 🌟 지역 필터와 연령 필터를 한 줄에 모두 렌더링하는 함수
    function generateFilters() {
        const filterGroup = document.getElementById('combined-filter-group');
        filterGroup.innerHTML = ''; 

        // 1. 지역 데이터를 분석하여 mappedLoc 에 저장
        const presentLocs = new Set();
        const fixedLocs = ['청주', '충북', '대전', '세종', '온라인'];
        const chungbukSubRegions = ['괴산', '음성', '증평', '보은', '옥천', '충주', '제천', '진천', '단양', '영동'];

        eventData.forEach(item => {
            if (item.loc && item.loc.trim() !== '') {
                const locText = item.loc.trim();
                
                if (chungbukSubRegions.includes(locText) || locText === '충북') {
                    item.mappedLoc = '충북';
                } else if (fixedLocs.includes(locText)) {
                    item.mappedLoc = locText;
                } else {
                    // 고정된 5개 지역이나 충북 하위지역이 아니면 모두 '기타'로 묶임 (천안 포함)
                    item.mappedLoc = '기타';
                }
                presentLocs.add(item.mappedLoc);
            } else {
                item.mappedLoc = null; // 위치 정보가 아예 없는 경우
            }
        });

        // 2. 지역 버튼 렌더링
        const orderedLocs = [...fixedLocs, '기타'];
        orderedLocs.forEach((loc, index) => {
            if (presentLocs.has(loc)) {
                const id = `loc-dynamic-${index}`;
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.id = id;
                checkbox.value = loc;
                checkbox.className = 'filter-cb loc-cb'; 
                checkbox.onchange = applyFilters;

                const label = document.createElement('label');
                label.htmlFor = id;
                label.className = 'cb-label';
                label.innerText = loc;

                filterGroup.appendChild(checkbox);
                filterGroup.appendChild(label);
            }
        });

        // 3. 지역과 연령을 구분하는 시각적 분리선 추가 (| 기호)
        if (presentLocs.size > 0) {
            const divider = document.createElement('span');
            divider.innerText = '|';
            divider.style.color = '#ccc';
            divider.style.display = 'flex';
            divider.style.alignItems = 'center';
            divider.style.fontSize = '0.7rem';
            divider.style.margin = '0 2px';
            filterGroup.appendChild(divider);
        }

        // 4. 연령 버튼 렌더링
        const ageFilters = ['미취학', '초등', '중고등', '성인'];
        ageFilters.forEach((age, index) => {
            const id = `age-dynamic-${index}`;
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.id = id;
            checkbox.value = age;
            checkbox.className = 'filter-cb age-cb'; 
            checkbox.onchange = applyFilters;

            const label = document.createElement('label');
            label.htmlFor = id;
            label.className = 'cb-label age-label';
            label.innerText = age;

            filterGroup.appendChild(checkbox);
            filterGroup.appendChild(label);
        });
    }

    function parseDateValue(dateStr) {
        if (!dateStr) return 9999; 
        
        let match = dateStr.match(/(\d{1,2})\/(\d{1,2})/);
        if (match) return parseInt(match[1]) * 100 + parseInt(match[2]);
        
        match = dateStr.match(/(\d{1,2})월\s*(\d{1,2})일/);
        if (match) return parseInt(match[1]) * 100 + parseInt(match[2]);
        
        match = dateStr.match(/(\d{1,2})월/);
        if (match) return parseInt(match[1]) * 100;
        
        return 9999; 
    }

    let currentTab = 'ongoing'; 

    function changeTab(element, type) {
        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        element.classList.add('active');
        currentTab = type;
        applyFilters(); 
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function applyFilters() {
        const checkedLocBoxes = document.querySelectorAll('.loc-cb:checked');
        const selectedLocs = Array.from(checkedLocBoxes).map(cb => cb.value);
        
        const checkedAgeBoxes = document.querySelectorAll('.age-cb:checked');
        const selectedAges = Array.from(checkedAgeBoxes).map(cb => cb.value);

        const keyword = document.getElementById('search-input').value.trim().toLowerCase();

        const container = document.getElementById('list-container');
        container.innerHTML = '';

        if (eventData.length === 0) return;

        let filteredData = eventData.filter(item => {
            const matchTab = item.type === currentTab;
            
            // 🌟 지역 필터 로직: 사전에 분류해둔 mappedLoc으로 깔끔하게 매칭
            let matchLoc = false;
            if (selectedLocs.length === 0) {
                matchLoc = true; 
            } else {
                matchLoc = selectedLocs.some(loc => item.mappedLoc === loc);
            }

            let matchAge = false;
            if (selectedAges.length === 0) {
                matchAge = true; 
            } else {
                matchAge = selectedAges.some(age => item.mappedAges && item.mappedAges.includes(age));
            }

            // 검색어 매칭 시에는 엑셀 원본 loc(예: 천안, 부산 등)을 검색할 수 있게 유지
            let matchSearch = true;
            if (keyword) {
                matchSearch = (item.title && item.title.toLowerCase().includes(keyword)) ||
                              (item.place && item.place.toLowerCase().includes(keyword)) ||
                              (item.loc && item.loc.toLowerCase().includes(keyword));
            }

            return matchTab && matchLoc && matchAge && matchSearch;
        });

        if (currentTab === 'ongoing') {
            filteredData.sort((a, b) => {
                if (a.isTodayClose !== b.isTodayClose) return b.isTodayClose ? 1 : -1;
                if (a.isTomorrowClose !== b.isTomorrowClose) return b.isTomorrowClose ? 1 : -1;
                
                const aEndVal = parseDateValue(a.applyEnd);
                const bEndVal = parseDateValue(b.applyEnd);
                
                return aEndVal - bEndVal; 
            });
        }

        if (filteredData.length === 0) {
            container.innerHTML = '<div class="empty-state">해당하는 행사가 없습니다. 조건이나 검색어를 변경해 보세요! 😥</div>';
            return;
        }

        filteredData.forEach(item => {
            let safeCost = item.costType || '비용정보 없음';
            if (safeCost === '해당정보 없음') safeCost = '비용정보 없음';
            
            let costBadgeClass = 'badge-info';
            if (safeCost.includes('무료')) costBadgeClass = 'badge-free';
            else if (safeCost.includes('유료')) costBadgeClass = 'badge-paid';

            let dateBadges = '';
            if (item.type === 'affiliate') dateBadges += `<span class="badge badge-affiliate">제휴이벤트</span> `;
            if (item.isTodayClose) dateBadges += `<span class="badge badge-today">오늘마감</span> `;
            if (item.isTomorrowOpen) dateBadges += `<span class="badge badge-open">내일오픈</span> `;
            if (item.isTomorrowClose) dateBadges += `<span class="badge badge-close">내일마감</span> `;

            let applyTextStyle = 'color:var(--text-sub);';
            if (item.isTodayClose) applyTextStyle = 'color:#E53935; font-weight:700;';

            let cardClass = 'card';
            let overlayHTML = '';
            if (item.type === 'affiliate') {
                cardClass += ' coming-soon';
                overlayHTML = `
                    <div class="coming-soon-overlay">
                        <div class="coming-soon-stamp">COMING SOON</div>
                    </div>
                `;
            }

            let linkAttr = `href="${item.link || '#'}"`;
            if (item.link && item.link.toLowerCase().startsWith('javascript:')) {
                linkAttr = `href="#" onclick="${item.link.replace('javascript:', '')}"`;
            }

            const cardHTML = `
                <div class="${cardClass}">
                    ${overlayHTML}
                    <div class="card-header">
                        <div class="badges">
                            ${dateBadges}
                            <span class="badge badge-loc">${item.loc || ''}</span>
                            <span class="badge badge-age">${item.age || ''}</span>
                            <span class="badge ${costBadgeClass}">${safeCost}</span> 
                        </div>
                    </div>
                    <h2 class="title">${item.title || ''}</h2>
                    <div class="info-row"><div class="info-label">장소</div><div class="info-desc">${item.place || ''}</div></div>
                    <div class="info-row"><div class="info-label">접수기간</div><div class="info-desc" style="${applyTextStyle}">${item.displayText || ''}</div></div>
                    <div class="info-row"><div class="info-label">운영일정</div><div class="info-desc">${item.date || '해당정보 없음'}</div></div>
                    <a ${linkAttr} ${item.type !== 'affiliate' && !item.link?.includes('javascript:') ? 'target="_blank"' : ''} class="btn-link">
                        ${item.type === 'affiliate' ? '제휴 혜택 확인하기 🎁' : '상세보기 및 예약 ↗'}
                    </a>
                </div>
            `;
            container.innerHTML += cardHTML;
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        initNotice(); 
        initLastUpdated();
        initVisitCounters();
        
        fetchEventData(); 
    });
</script>

</body>
</html>
