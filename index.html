<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>리얼 복싱 MR: 패스스루 트레이닝</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        
        /* WebXR 세션 진입 시 Three.js 캔버스가 전체화면이 됨 */
        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* WebXR DOM Overlay UI Layer */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* 오버레이 자체가 클릭을 막지 않도록 */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .interactive {
            pointer-events: auto; /* 상호작용이 필요한 UI 요소 */
        }
        
        .text-glow {
            text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(255,255,255,0.4);
        }

        /* 초기 화면 */
        #pre-ar-screen {
            backdrop-filter: blur(10px);
        }

        /* AR 버튼 커스텀 위치 조정용 */
        #ar-button-container {
            position: relative;
            z-index: 20;
            margin-top: 2rem;
            display: flex;
            justify-content: center;
        }
    </style>
    
    <!-- Three.js ES Modules 설정 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <!-- WebXR DOM Overlay 루트 엘리먼트 -->
    <div id="ui-layer">
        
        <!-- 게임 진입 전 안내 화면 -->
        <div id="pre-ar-screen" class="interactive absolute inset-0 bg-gray-900 bg-opacity-90 flex flex-col items-center justify-center">
            <h1 class="text-white text-5xl font-black italic mb-4 text-glow">REAL BOXING MR</h1>
            <h2 class="text-red-500 text-xl font-bold mb-6">핸드 트래킹 & 패스스루 지원</h2>
            <div class="text-gray-300 text-center max-w-md space-y-2 mb-8 px-4">
                <p>메타 퀘스트 3 등의 기기에서 주변 환경을 보며 복싱 연습을 할 수 있습니다.</p>
                <p class="text-yellow-400 font-bold mt-4">안전한 공간을 확보한 후 아래 버튼을 눌러주세요.</p>
            </div>
            <!-- ARButton이 여기에 삽입됨 -->
            <div id="ar-button-container"></div>
        </div>

        <!-- 게임 중 HUD -->
        <div id="hud" class="hidden p-8 flex justify-between items-start w-full">
            <div>
                <div class="text-white text-3xl font-bold italic tracking-wider text-glow">SCORE: <span id="score-display">0</span></div>
                <div class="text-yellow-400 text-2xl font-bold italic mt-1 text-glow" id="combo-display">COMBO: 0</div>
            </div>
            <div class="w-1/3 max-w-xs">
                <div class="text-white text-sm font-bold mb-1 text-right text-glow">STAMINA</div>
                <div class="w-full h-4 bg-gray-700 rounded-full overflow-hidden border-2 border-gray-900 shadow-[0_0_10px_rgba(255,255,255,0.2)]">
                    <div id="health-bar" class="h-full bg-green-500 transition-all duration-200" style="width: 100%;"></div>
                </div>
            </div>
        </div>

        <!-- 타격 피드백 (화면 중앙 상단) -->
        <div class="absolute top-1/4 w-full flex justify-center pointer-events-none">
            <div id="hit-feedback" class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-t from-yellow-400 to-white text-glow transition-all duration-100 opacity-0 transform scale-50">
                PERFECT!
            </div>
        </div>

        <!-- 메뉴 오버레이 (AR 세션 내에서 표시됨) -->
        <div id="menu-overlay" class="hidden absolute inset-0 interactive flex items-center justify-center">
            <div class="text-center bg-gray-900 bg-opacity-80 p-8 rounded-3xl border border-gray-700 shadow-2xl max-w-md w-full mx-4 backdrop-blur-md">
                <h1 class="text-5xl font-black text-white italic mb-2 tracking-tighter text-glow" id="menu-title">READY?</h1>
                
                <div id="menu-desc" class="text-gray-200 text-sm mb-8 space-y-4">
                    <p class="text-lg font-bold text-green-400">주먹을 쥐고 준비하세요!</p>
                    <div class="flex justify-center gap-6 my-4">
                        <div class="flex flex-col items-center">
                            <div class="w-10 h-10 rounded-full bg-blue-500 border-4 border-white mb-2 shadow-[0_0_15px_rgba(59,130,246,0.8)]"></div>
                            <span class="text-sm font-bold text-blue-400">왼손 미트</span>
                        </div>
                        <div class="flex flex-col items-center">
                            <div class="w-10 h-10 rounded-full bg-red-500 border-4 border-white mb-2 shadow-[0_0_15px_rgba(239,68,68,0.8)]"></div>
                            <span class="text-sm font-bold text-red-400">오른손 미트</span>
                        </div>
                    </div>
                    <p class="text-yellow-400 font-bold">허공에 나타나는 미트를 타이밍 맞춰 타격하세요.</p>
                </div>
                
                <div id="final-stats" class="hidden mb-8 text-white">
                    <div class="text-lg">최종 점수</div>
                    <div class="text-5xl font-black text-yellow-400 mb-2" id="final-score">0</div>
                    <div class="text-lg text-gray-400">최대 콤보: <span id="final-combo" class="text-white font-bold">0</span></div>
                </div>

                <button id="start-btn" class="w-full py-5 bg-gradient-to-r from-red-600 to-red-800 hover:from-red-500 hover:to-red-700 text-white text-3xl font-black italic rounded-xl transform transition hover:scale-105 active:scale-95 shadow-[0_0_30px_rgba(220,38,38,0.6)]">
                    훈련 시작!
                </button>
            </div>
        </div>
    </div>

    <!-- WebAudio API & 3D WebXR 엔진 -->
    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        // --- 사운드 시스템 ---
        const AudioSys = {
            ctx: null,
            init: function() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },
            playHit: function(isPerfect) {
                if (!this.ctx) return;
                const t = this.ctx.currentTime;
                
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                
                osc.frequency.setValueAtTime(isPerfect ? 150 : 100, t);
                osc.frequency.exponentialRampToValueAtTime(40, t + 0.1);
                
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(isPerfect ? 1.0 : 0.6, t + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(t);
                osc.stop(t + 0.2);

                const bufferSize = this.ctx.sampleRate * 0.2;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                
                const noise = this.ctx.createBufferSource();
                noise.buffer = buffer;
                const noiseFilter = this.ctx.createBiquadFilter();
                noiseFilter.type = 'bandpass';
                noiseFilter.frequency.value = isPerfect ? 2000 : 1000;
                
                const noiseGain = this.ctx.createGain();
                noiseGain.gain.setValueAtTime(isPerfect ? 0.8 : 0.4, t);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
                
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(this.ctx.destination);
                noise.start(t);
            },
            playMiss: function() {
                if (!this.ctx) return;
                const t = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, t);
                osc.frequency.linearRampToValueAtTime(100, t + 0.3);
                gain.gain.setValueAtTime(0.3, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(t);
                osc.stop(t + 0.3);
            }
        };

        // --- Three.js & WebXR 초기화 ---
        let scene, camera, renderer;
        let controller1, controller2;
        let leftHitbox, rightHitbox;
        
        // 게임 상태 및 엔티티
        const State = { MENU: 0, PLAYING: 1, GAMEOVER: 2 };
        let currentState = State.MENU;
        
        let score = 0, combo = 0, maxCombo = 0, health = 100;
        let spawnTimer = 0, currentSpawnInterval = 1.2, targetLifespan = 1.5, gameTime = 0;
        
        let targets = [];
        let particles = [];
        let lastTime = 0;

        // UI DOM 요소
        const UI = {
            preAR: document.getElementById('pre-ar-screen'),
            arContainer: document.getElementById('ar-button-container'),
            hud: document.getElementById('hud'),
            menuOverlay: document.getElementById('menu-overlay'),
            score: document.getElementById('score-display'),
            combo: document.getElementById('combo-display'),
            health: document.getElementById('health-bar'),
            startBtn: document.getElementById('start-btn'),
            menuTitle: document.getElementById('menu-title'),
            menuDesc: document.getElementById('menu-desc'),
            finalStats: document.getElementById('final-stats'),
            finalScore: document.getElementById('final-score'),
            finalCombo: document.getElementById('final-combo'),
            feedback: document.getElementById('hit-feedback')
        };

        init();

        function init() {
            // 장면 설정
            scene = new THREE.Scene();

            // 카메라 설정
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // 렌더러 설정 (알파 투명도 활성화로 패스스루 배경 노출)
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true; // XR 활성화
            document.body.appendChild(renderer.domElement);

            // 조명 추가
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
            hemiLight.position.set(0, 2, 0);
            scene.add(hemiLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(0, 2, 1);
            scene.add(dirLight);

            // AR 진입 버튼 추가 (DOM Overlay 및 패스스루 기능 요청)
            const arButton = ARButton.createButton(renderer, {
                optionalFeatures: ['dom-overlay', 'hand-tracking', 'local-floor'],
                domOverlay: { root: document.getElementById('ui-layer') }
            });
            UI.arContainer.appendChild(arButton);
            
            // 스타일 덮어쓰기 (가운데 정렬)
            arButton.style.position = 'relative';
            arButton.style.bottom = 'auto';

            // 핸드 트래킹 / 컨트롤러 히트박스(글러브) 설정
            const gloveGeo = new THREE.SphereGeometry(0.08, 16, 16);
            const leftMat = new THREE.MeshPhongMaterial({ color: 0x3b82f6, transparent: true, opacity: 0.7, wireframe: true });
            const rightMat = new THREE.MeshPhongMaterial({ color: 0xef4444, transparent: true, opacity: 0.7, wireframe: true });
            
            leftHitbox = new THREE.Mesh(gloveGeo, leftMat);
            rightHitbox = new THREE.Mesh(gloveGeo, rightMat);

            function onControllerConnected(event) {
                // 이벤트의 handedness(left, right) 속성을 바탕으로 글러브 색상 구분
                this.handedness = event.data.handedness;
                if (this.handedness === 'left') this.add(leftHitbox);
                else if (this.handedness === 'right') this.add(rightHitbox);
                else this.add(rightHitbox); // fallback
            }

            function onControllerDisconnected() {
                if (this.handedness === 'left') this.remove(leftHitbox);
                else if (this.handedness === 'right') this.remove(rightHitbox);
            }

            controller1 = renderer.xr.getController(0);
            controller1.addEventListener('connected', onControllerConnected);
            controller1.addEventListener('disconnected', onControllerDisconnected);
            scene.add(controller1);

            controller2 = renderer.xr.getController(1);
            controller2.addEventListener('connected', onControllerConnected);
            controller2.addEventListener('disconnected', onControllerDisconnected);
            scene.add(controller2);

            // 리사이즈 처리
            window.addEventListener('resize', onWindowResize);

            // XR 세션 시작 이벤트 (안내문 숨기고 게임 메뉴 표시)
            renderer.xr.addEventListener('sessionstart', () => {
                UI.preAR.classList.add('hidden');
                UI.menuOverlay.classList.remove('hidden');
            });

            // XR 세션 종료 이벤트
            renderer.xr.addEventListener('sessionend', () => {
                UI.preAR.classList.remove('hidden');
                UI.menuOverlay.classList.add('hidden');
                UI.hud.classList.add('hidden');
                targets.forEach(t => t.destroy());
                targets = [];
                currentState = State.MENU;
            });

            // 메인 루프 시작
            renderer.setAnimationLoop(render);
        }

        // --- 3D 엔티티 클래스 ---

        class Target3D {
            constructor() {
                this.isLeft = Math.random() < 0.5;
                this.color = this.isLeft ? 0x3b82f6 : 0xef4444; // 파랑/빨강
                
                this.mesh = new THREE.Group();
                
                // 미트 베이스 (회색)
                const baseGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.03, 32);
                baseGeo.rotateX(Math.PI / 2);
                const baseMat = new THREE.MeshPhongMaterial({ color: 0x1f2937 });
                const base = new THREE.Mesh(baseGeo, baseMat);
                this.mesh.add(base);
                
                // 타겟 중앙 마크
                const centerGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.04, 32);
                centerGeo.rotateX(Math.PI / 2);
                const centerMat = new THREE.MeshPhongMaterial({ color: this.color });
                const center = new THREE.Mesh(centerGeo, centerMat);
                this.mesh.add(center);
                
                // 줄어드는 타이밍 링
                const ringGeo = new THREE.TorusGeometry(0.12, 0.005, 16, 64);
                const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 });
                this.ring = new THREE.Mesh(ringGeo, ringMat);
                this.mesh.add(this.ring);

                // 스폰 위치 계산 (사용자 앞쪽 0.4m ~ 0.7m 거리, 가슴~머리 높이)
                // 패스스루 환경에서는 바닥 기준(local-floor)이므로 y값이 실제 높이가 됩니다.
                const spawnX = (Math.random() - 0.5) * 0.8; // 좌우 -0.4 ~ 0.4m
                const spawnY = 1.0 + Math.random() * 0.6;   // 높이 1.0 ~ 1.6m
                const spawnZ = -0.4 - Math.random() * 0.3;  // 깊이 -0.4 ~ -0.7m
                
                this.mesh.position.set(spawnX, spawnY, spawnZ);
                
                // 플레이어(카메라) 방향을 바라보게 회전
                this.mesh.lookAt(0, spawnY, 0); // 머리 기준(원점)을 향함

                scene.add(this.mesh);

                this.maxLife = targetLifespan;
                this.life = this.maxLife;
                this.hit = false;
                this.radius = 0.15; // 충돌 반경
            }

            update(dt) {
                this.life -= dt;
                
                // 타이밍 링 애니메이션
                const lifeRatio = Math.max(0, this.life / this.maxLife);
                const ringScale = 1.0 + lifeRatio * 1.5; // 2.5에서 1.0으로 축소
                this.ring.scale.set(ringScale, ringScale, 1);
                
                return this.life <= 0 && !this.hit;
            }

            evaluateTiming() {
                const ratio = this.life / this.maxLife;
                if (ratio < 0.25) return 2; // Perfect
                if (ratio < 0.6) return 1;  // Good
                return 1;
            }

            destroy() {
                scene.remove(this.mesh);
            }
        }

        class Particle3D {
            constructor(pos, colorHex) {
                this.mesh = new THREE.Mesh(
                    new THREE.BoxGeometry(0.015, 0.015, 0.015),
                    new THREE.MeshBasicMaterial({ color: colorHex, transparent: true })
                );
                this.mesh.position.copy(pos);
                
                // 폭발 방향 (무작위)
                this.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2
                );
                this.life = 1.0;
                scene.add(this.mesh);
            }
            
            update(dt) {
                this.mesh.position.addScaledVector(this.velocity, dt);
                this.life -= dt * 1.5;
                this.mesh.material.opacity = Math.max(0, this.life);
                
                // 회전 효과
                this.mesh.rotation.x += dt * 5;
                this.mesh.rotation.y += dt * 5;
                
                return this.life <= 0;
            }
            
            destroy() {
                scene.remove(this.mesh);
            }
        }

        // --- 게임 로직 및 렌더링 루프 ---

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function createParticles(pos, colorHex, count) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle3D(pos, colorHex));
                if (Math.random() > 0.5) particles.push(new Particle3D(pos, 0xffffff)); // 스파크
            }
        }

        let feedbackTimeout;
        function showUIFeedback(text, colorClass) {
            UI.feedback.textContent = text;
            UI.feedback.className = `text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-t from-gray-200 to-white text-glow transition-all duration-100 transform ${text === 'PERFECT!' ? 'from-yellow-400 scale-125' : 'scale-100'}`;
            UI.feedback.style.opacity = 1;
            
            clearTimeout(feedbackTimeout);
            feedbackTimeout = setTimeout(() => {
                UI.feedback.style.opacity = 0;
                UI.feedback.style.transform = 'scale(0.5)';
            }, 600);
        }

        function updateHUD() {
            UI.score.textContent = score;
            UI.combo.textContent = `COMBO: ${combo}`;
            
            if (combo >= 20) UI.combo.className = "text-red-500 text-3xl font-black italic mt-1 text-glow";
            else if (combo >= 10) UI.combo.className = "text-orange-400 text-2xl font-bold italic mt-1 text-glow";
            else UI.combo.className = "text-yellow-400 text-2xl font-bold italic mt-1 text-glow";

            UI.health.style.width = `${Math.max(0, health)}%`;
            if (health > 50) UI.health.className = "h-full bg-green-500 transition-all duration-200";
            else if (health > 20) UI.health.className = "h-full bg-yellow-500 transition-all duration-200 shadow-[0_0_10px_yellow]";
            else UI.health.className = "h-full bg-red-600 transition-all duration-200 shadow-[0_0_15px_red]";

            if (health <= 0 && currentState === State.PLAYING) {
                gameOver();
            }
        }

        function startGame() {
            AudioSys.init();
            currentState = State.PLAYING;
            score = 0;
            combo = 0;
            maxCombo = 0;
            health = 100;
            gameTime = 0;
            currentSpawnInterval = 1.2;
            targetLifespan = 1.5;
            spawnTimer = 0.5; // 시작 후 약간 딜레이
            
            // 기존 객체 정리
            targets.forEach(t => t.destroy());
            targets = [];
            particles.forEach(p => p.destroy());
            particles = [];
            
            UI.menuOverlay.classList.add('hidden');
            UI.hud.classList.remove('hidden');
            updateHUD();
        }

        function gameOver() {
            currentState = State.GAMEOVER;
            UI.hud.classList.add('hidden');
            UI.menuOverlay.classList.remove('hidden');
            
            UI.menuTitle.textContent = "TRAINING OVER";
            UI.menuTitle.className = "text-6xl font-black text-red-600 italic mb-2 tracking-tighter text-glow";
            UI.menuDesc.classList.add('hidden');
            UI.finalStats.classList.remove('hidden');
            
            UI.finalScore.textContent = score;
            UI.finalCombo.textContent = maxCombo;
            UI.startBtn.textContent = "다시 훈련하기";
        }

        UI.startBtn.addEventListener('click', startGame);

        function checkCollisions() {
            const leftPos = new THREE.Vector3();
            const rightPos = new THREE.Vector3();
            let lValid = false, rValid = false;
            
            // 3D 공간 상에서 컨트롤러(손)의 현재 위치를 가져옵니다.
            if (controller1.handedness) {
                if (controller1.handedness === 'left') { controller1.getWorldPosition(leftPos); lValid = true; }
                if (controller1.handedness === 'right') { controller1.getWorldPosition(rightPos); rValid = true; }
            }
            if (controller2.handedness) {
                if (controller2.handedness === 'left') { controller2.getWorldPosition(leftPos); lValid = true; }
                if (controller2.handedness === 'right') { controller2.getWorldPosition(rightPos); rValid = true; }
            }

            for (let i = targets.length - 1; i >= 0; i--) {
                let t = targets[i];
                const distToLeft = lValid ? t.mesh.position.distanceTo(leftPos) : 999;
                const distToRight = rValid ? t.mesh.position.distanceTo(rightPos) : 999;

                // 타겟의 반경 + 히트박스(글러브)의 반경을 고려한 충돌 판정 거리
                const hitThreshold = t.radius + 0.12; 

                // 파란색 미트는 왼손, 빨간색 미트는 오른손으로만 타격 가능
                let hitL = t.isLeft && lValid && (distToLeft < hitThreshold);
                let hitR = !t.isLeft && rValid && (distToRight < hitThreshold);

                if (hitL || hitR) {
                    t.hit = true;
                    
                    const timing = t.evaluateTiming();
                    const isPerfect = timing === 2;
                    AudioSys.playHit(isPerfect);
                    
                    // 점수 및 스탯 계산
                    combo++;
                    if (combo > maxCombo) maxCombo = combo;
                    score += isPerfect ? 50 : 20 + (combo * 5);
                    health = Math.min(100, health + (isPerfect ? 5 : 2));
                    
                    showUIFeedback(isPerfect ? "PERFECT!" : "GOOD!", isPerfect ? "text-yellow-400" : "text-white");
                    createParticles(t.mesh.position, t.color, isPerfect ? 20 : 10);
                    
                    // 피드백 햅틱 (컨트롤러를 사용할 경우)
                    const gamepad = hitL ? 
                        (controller1.handedness === 'left' ? renderer.xr.getSession().inputSources[0]?.gamepad : renderer.xr.getSession().inputSources[1]?.gamepad) : 
                        (controller1.handedness === 'right' ? renderer.xr.getSession().inputSources[0]?.gamepad : renderer.xr.getSession().inputSources[1]?.gamepad);
                    
                    if (gamepad && gamepad.hapticActuators && gamepad.hapticActuators.length > 0) {
                        gamepad.hapticActuators[0].pulse(isPerfect ? 1.0 : 0.5, 100);
                    }

                    t.destroy();
                    targets.splice(i, 1);
                }
            }
        }

        function render(timestamp, frame) {
            // 시간 계산
            const dt = lastTime === 0 ? 0 : (timestamp - lastTime) / 1000;
            lastTime = timestamp;

            if (currentState === State.PLAYING) {
                gameTime += dt;
                
                // 시간이 지날수록 생성 주기와 미트 수명 감소 (난이도 증가)
                currentSpawnInterval = Math.max(0.4, 1.2 - (gameTime * 0.015));
                targetLifespan = Math.max(0.7, 1.5 - (gameTime * 0.01));
                
                health -= dt * 2.5; // 스태미나 자연 감소

                // 미트 스폰 로직
                spawnTimer -= dt;
                if (spawnTimer <= 0) {
                    targets.push(new Target3D());
                    spawnTimer = currentSpawnInterval;
                }

                // 미트 업데이트 및 Miss 처리
                for (let i = targets.length - 1; i >= 0; i--) {
                    if (targets[i].update(dt)) {
                        // 타임아웃으로 놓침
                        combo = 0;
                        health -= 12;
                        AudioSys.playMiss();
                        showUIFeedback("MISS!", "text-red-500");
                        
                        targets[i].destroy();
                        targets.splice(i, 1);
                    }
                }

                // 타격 충돌 검사
                checkCollisions();

                // 파티클 업데이트
                for (let i = particles.length - 1; i >= 0; i--) {
                    if (particles[i].update(dt)) {
                        particles[i].destroy();
                        particles.splice(i, 1);
                    }
                }

                updateHUD();
            }

            // Three.js 렌더링 (AR 배경이 자동으로 렌더링됨)
            renderer.render(scene, camera);
        }

    </script>
