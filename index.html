<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>크로스플랫폼 3D 핑퐁 (AR/VR/PC)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: white;
            z-index: 100;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }
        #instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0, 0, 0, 0.85);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            max-width: 80%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 200;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }
        .play-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .play-btn:hover {
            background-color: #45a049;
        }
        .ar-btn-hint {
            font-size: 0.85em;
            color: #aaa;
            margin-top: 5px;
        }
    </style>
    <!-- Three.js 및 관련 모듈 임포트맵 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info">크로스플랫폼 3D 핑퐁 게임</div>
    <div id="instructions">
        <h2>🏓 3D & AR 탁구</h2>
        <p>기기에 맞는 플레이 방식을 선택하세요.</p>
        <ul style="text-align: left; font-size: 0.9em; line-height: 1.6; color: #ddd;">
            <li><strong>PC/모바일:</strong> 마우스나 터치로 채를 움직여 플레이합니다.</li>
            <li><strong>메타퀘스트/비전프로:</strong> 하단의 AR 버튼을 눌러 현실 공간에서 컨트롤러나 손으로 플레이합니다.</li>
        </ul>
        <div class="btn-container">
            <button class="play-btn" id="pc-play-btn">💻 PC / 모바일 모드로 시작</button>
            <div class="ar-btn-hint">* AR 모드는 브라우저 하단에 생성되는 'START AR' 버튼을 누르세요.</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        let camera, scene, renderer;
        let controller1, controller2;
        
        // 게임 객체들
        let table, net, ball;
        let aiPaddle;
        let paddles = []; // XR 컨트롤러 패들
        let pcPaddle;     // PC/모바일 마우스 패들
        
        // 게임 상태 및 물리 변수
        const ballRadius = 0.02;
        const tableWidth = 1.52;
        const tableLength = 2.74;
        const tableHeight = 0.76;
        const tableZ = -1.8; // 사용자 기준 앞쪽에 배치

        let ballVelocity = new THREE.Vector3(0, 0, 0);
        const gravity = 9.8;
        let playerScore = 0;
        let aiScore = 0;
        
        // PC 마우스 컨트롤용
        let mouseCoords = new THREE.Vector2(0, 0);
        let pcModeActive = false;
        
        // 점수판 텍스처
        let scoreCanvas, scoreContext, scoreTexture, scoreBoard;

        init();

        function init() {
            // 1. 씬 및 카메라 설정
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            
            // PC 모드 기본 카메라 위치 셋팅
            camera.position.set(0, tableHeight + 0.7, tableZ + tableLength / 2 + 0.6);
            camera.lookAt(0, tableHeight, tableZ);

            // 2. 조명 설정
            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            light.position.set(0.5, 1, 0.25);
            scene.add(light);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(0, 2, 0);
            scene.add(dirLight);

            // 3. 렌더러 설정 (WebXR 활성화)
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            // AR 환경의 실제 바닥 높이를 기준으로 설정
            renderer.xr.setReferenceSpaceType('local-floor');
            document.body.appendChild(renderer.domElement);

            // 4. AR 시작 버튼 추가 (Quest, Vision Pro 용)
            const arButton = ARButton.createButton(renderer, { requiredFeatures: ['local-floor'] });
            document.body.appendChild(arButton);
            
            arButton.addEventListener('click', () => {
                document.getElementById('instructions').style.display = 'none';
                pcModeActive = false;
                pcPaddle.visible = false; // AR모드에서는 PC 패들 숨김
            });

            // PC 모드 시작 버튼
            document.getElementById('pc-play-btn').addEventListener('click', () => {
                document.getElementById('instructions').style.display = 'none';
                pcModeActive = true;
                pcPaddle.visible = true;
                // PC모드에서는 가상의 배경(방)을 어둡게 생성 (AR이 아니므로)
                scene.background = new THREE.Color(0x222222);
            });

            // 5. 게임 오브젝트 생성
            createGameObjects();
            createScoreBoard();

            // 6. 컨트롤러 (VR/AR용) 및 PC 마우스 설정
            setupControllers();
            setupPCControls();

            // 7. 리사이즈 이벤트
            window.addEventListener('resize', onWindowResize);

            // 애니메이션 루프 시작
            renderer.setAnimationLoop(render);
            
            // 공 초기화
            resetBall(true);
        }

        function createGameObjects() {
            // 탁구대 (테이블)
            const tableGeo = new THREE.BoxGeometry(tableWidth, 0.05, tableLength);
            const tableMat = new THREE.MeshLambertMaterial({ color: 0x1a5e20 }); // 진한 녹색
            table = new THREE.Mesh(tableGeo, tableMat);
            table.position.set(0, tableHeight, tableZ);
            scene.add(table);

            // 네트
            const netGeo = new THREE.BoxGeometry(tableWidth + 0.1, 0.15, 0.02);
            const netMat = new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 });
            net = new THREE.Mesh(netGeo, netMat);
            net.position.set(0, tableHeight + 0.075, tableZ);
            scene.add(net);

            // 네트 기둥
            const poleGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.2);
            const poleMat = new THREE.MeshLambertMaterial({ color: 0x555555 });
            const leftPole = new THREE.Mesh(poleGeo, poleMat);
            leftPole.position.set(-tableWidth / 2 - 0.05, tableHeight + 0.05, tableZ);
            const rightPole = leftPole.clone();
            rightPole.position.set(tableWidth / 2 + 0.05, tableHeight + 0.05, tableZ);
            scene.add(leftPole, rightPole);

            // 공
            const ballGeo = new THREE.SphereGeometry(ballRadius, 32, 32);
            const ballMat = new THREE.MeshLambertMaterial({ color: 0xffa500 }); // 오렌지색
            ball = new THREE.Mesh(ballGeo, ballMat);
            scene.add(ball);

            // AI 탁구채
            aiPaddle = createPaddle(0x0000ff); // 파란색
            aiPaddle.position.set(0, tableHeight + 0.2, tableZ - tableLength / 2 - 0.2);
            scene.add(aiPaddle);
            
            // PC용 탁구채
            pcPaddle = createPaddle(0xff0000); // 빨간색
            pcPaddle.position.set(0, tableHeight + 0.2, tableZ + tableLength / 2 + 0.1);
            pcPaddle.visible = false; // 기본은 숨김, PC 모드에서 활성화
            scene.add(pcPaddle);
        }

        function createScoreBoard() {
            scoreCanvas = document.createElement('canvas');
            scoreCanvas.width = 512;
            scoreCanvas.height = 256;
            scoreContext = scoreCanvas.getContext('2d');
            
            scoreTexture = new THREE.CanvasTexture(scoreCanvas);
            const scoreMat = new THREE.MeshBasicMaterial({ map: scoreTexture, transparent: true });
            const scoreGeo = new THREE.PlaneGeometry(1, 0.5);
            scoreBoard = new THREE.Mesh(scoreGeo, scoreMat);
            
            // 네트 위쪽에 점수판 배치
            scoreBoard.position.set(0, tableHeight + 0.5, tableZ);
            scene.add(scoreBoard);
            
            updateScoreBoardText();
        }

        function updateScoreBoardText() {
            scoreContext.clearRect(0, 0, scoreCanvas.width, scoreCanvas.height);
            scoreContext.fillStyle = 'rgba(0, 0, 0, 0.5)';
            scoreContext.fillRect(0, 0, scoreCanvas.width, scoreCanvas.height);
            
            scoreContext.fillStyle = '#ffffff';
            scoreContext.font = 'bold 50px sans-serif';
            scoreContext.textAlign = 'center';
            scoreContext.textBaseline = 'middle';
            scoreContext.fillText(`내 점수: ${playerScore}  |  AI 점수: ${aiScore}`, scoreCanvas.width / 2, scoreCanvas.height / 2);
            
            scoreTexture.needsUpdate = true;
        }

        function createPaddle(color) {
            const paddleGroup = new THREE.Group();

            // 채 부분 (원통형을 납작하게)
            const padGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.02, 32);
            const padMat = new THREE.MeshLambertMaterial({ color: color });
            const padMesh = new THREE.Mesh(padGeo, padMat);
            padMesh.rotation.x = Math.PI / 2; // 세우기
            paddleGroup.add(padMesh);

            // 손잡이 부분
            const handleGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.1, 16);
            const handleMat = new THREE.MeshLambertMaterial({ color: 0x8b4513 }); // 갈색
            const handleMesh = new THREE.Mesh(handleGeo, handleMat);
            handleMesh.position.y = -0.09;
            paddleGroup.add(handleMesh);

            return paddleGroup;
        }

        function setupControllers() {
            // XR 환경 양손 컨트롤러 
            controller1 = renderer.xr.getController(0);
            scene.add(controller1);
            const playerPaddle1 = createPaddle(0xff0000); // 빨간색
            playerPaddle1.rotation.x = -Math.PI / 4; 
            playerPaddle1.position.set(0, 0, -0.05);
            controller1.add(playerPaddle1);
            paddles.push(controller1);

            controller2 = renderer.xr.getController(1);
            scene.add(controller2);
            const playerPaddle2 = createPaddle(0xff0000);
            playerPaddle2.rotation.x = -Math.PI / 4;
            playerPaddle2.position.set(0, 0, -0.05);
            controller2.add(playerPaddle2);
            paddles.push(controller2);
        }

        function setupPCControls() {
            // 마우스 및 터치 이벤트 매핑
            const onPointerMove = (event) => {
                let clientX = event.clientX;
                let clientY = event.clientY;

                if (event.touches && event.touches.length > 0) {
                    clientX = event.touches[0].clientX;
                    clientY = event.touches[0].clientY;
                }

                // 정규화된 기기 좌표 (NDC)
                mouseCoords.x = (clientX / window.innerWidth) * 2 - 1;
                mouseCoords.y = -(clientY / window.innerHeight) * 2 + 1;
            };

            window.addEventListener('mousemove', onPointerMove);
            window.addEventListener('touchmove', onPointerMove, { passive: false });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function resetBall(serveToPlayer) {
            // 공을 테이블 중앙, 약간 위로 초기화
            ball.position.set(0, tableHeight + 0.3, tableZ);
            
            // 초기 속도: 서브 방향에 따라 다르게 설정
            const speedZ = serveToPlayer ? 2.5 : -2.5;
            const speedX = (Math.random() - 0.5) * 1.5; // 약간의 좌우 랜덤성
            
            ballVelocity.set(speedX, 0, speedZ);
        }

        let clock = new THREE.Clock();
        let isResetting = false;

        function render() {
            const delta = Math.min(clock.getDelta(), 0.1); // 최대 delta 제한 (랙 방지)

            if (!isResetting) {
                // PC 모드 패들 위치 업데이트
                if (pcModeActive && !renderer.xr.isPresenting) {
                    // 마우스 좌표를 3D 공간으로 변환 (탁구대 끝자락 기준)
                    const targetX = mouseCoords.x * (tableWidth / 2 + 0.5);
                    const targetY = tableHeight + 0.2 + mouseCoords.y * 0.5;
                    
                    // 패들을 마우스 위치로 부드럽게 이동
                    pcPaddle.position.x = THREE.MathUtils.lerp(pcPaddle.position.x, targetX, 0.3);
                    pcPaddle.position.y = THREE.MathUtils.lerp(pcPaddle.position.y, targetY, 0.3);
                    
                    // 좌우 이동에 따라 패들에 약간의 기울기 추가
                    pcPaddle.rotation.y = -mouseCoords.x * 0.5;
                }

                // 물리 엔진 업데이트
                updatePhysics(delta);
                // AI 움직임 업데이트
                updateAI(delta);
            }

            renderer.render(scene, camera);
        }

        function updatePhysics(delta) {
            // 1. 공에 중력 적용
            ballVelocity.y -= gravity * delta;
            
            // 2. 공 위치 업데이트
            ball.position.x += ballVelocity.x * delta;
            ball.position.y += ballVelocity.y * delta;
            ball.position.z += ballVelocity.z * delta;

            // 3. 테이블 바운스 (충돌 처리)
            if (ball.position.y - ballRadius < tableHeight + 0.025 && ballVelocity.y < 0) {
                if (Math.abs(ball.position.x) < tableWidth / 2 && 
                    Math.abs(ball.position.z - tableZ) < tableLength / 2) {
                    
                    ball.position.y = tableHeight + 0.025 + ballRadius;
                    ballVelocity.y = Math.abs(ballVelocity.y) * 0.85; // 탄성계수
                    
                    ballVelocity.x *= 0.98;
                    ballVelocity.z *= 0.98;
                }
            }

            // 4. 플레이어 패들 충돌 처리 (XR 모드 vs PC 모드)
            let activePaddles = renderer.xr.isPresenting ? paddles : [];
            if (pcModeActive && !renderer.xr.isPresenting) {
                activePaddles = [pcPaddle];
            }

            activePaddles.forEach(paddleObj => {
                const padPos = new THREE.Vector3();
                paddleObj.getWorldPosition(padPos);
                
                // 간단한 구형 충돌 감지 (패들 반지름 0.08 + 공 0.02 = 0.1)
                if (ball.position.distanceTo(padPos) < 0.13 && ballVelocity.z > 0) {
                    // 패들에 맞음!
                    // 기본 반발력 + 날아오던 속도
                    ballVelocity.z = -Math.abs(ballVelocity.z) - 1.5; 
                    ballVelocity.y = 2.5; // 살짝 위로 띄움
                    
                    // 패들의 어느 부위에 맞았는지에 따라 좌우 회전/속도 부여
                    ballVelocity.x = (ball.position.x - padPos.x) * 10.0;
                    
                    // 최대/최소 속도 제한
                    if(ballVelocity.z < -7) ballVelocity.z = -7;
                }
            });

            // 5. AI 패들 충돌 처리
            const aiPos = new THREE.Vector3();
            aiPaddle.getWorldPosition(aiPos);
            
            if (ball.position.distanceTo(aiPos) < 0.13 && ballVelocity.z < 0) {
                // AI 패들에 맞음
                ballVelocity.z = Math.abs(ballVelocity.z) + 1.2; // 플레이어 쪽으로
                ballVelocity.y = 2.5; 
                ballVelocity.x = (ball.position.x - aiPos.x) * 8.0;
                
                if(ballVelocity.z > 6) ballVelocity.z = 6;
            }

            // 6. 득점/실점 판정
            // 공이 바닥에 떨어졌거나 너무 멀리 날아간 경우
            if (ball.position.y < 0 || Math.abs(ball.position.z - tableZ) > tableLength + 2) {
                if (ball.position.z > tableZ) {
                    // 사용자 쪽으로 넘어와서 아웃됨 -> AI 득점
                    aiScore++;
                    triggerReset(true);
                } else {
                    // AI 쪽으로 넘어가서 아웃됨 -> 사용자 득점
                    playerScore++;
                    triggerReset(false);
                }
                updateScoreBoardText();
            }
        }

        function updateAI(delta) {
            const targetX = ball.position.x;
            // 공이 네트를 넘어 AI 쪽으로 올 때만 집중해서 따라가도록 설정
            if (ballVelocity.z < 0) {
                aiPaddle.position.x = THREE.MathUtils.lerp(aiPaddle.position.x, targetX, 0.06);
            } else {
                // 플레이어 쪽으로 갈 때는 중앙으로 복귀
                aiPaddle.position.x = THREE.MathUtils.lerp(aiPaddle.position.x, 0, 0.02);
            }

            // 약간 위아래로 움직이게 (자연스러움을 위해)
            const targetY = Math.max(tableHeight + 0.1, ball.position.y);
            aiPaddle.position.y = THREE.MathUtils.lerp(aiPaddle.position.y, targetY, 0.05);
        }

        function triggerReset(serveToPlayer) {
            isResetting = true;
            setTimeout(() => {
                resetBall(serveToPlayer);
                isResetting = false;
            }, 1500); // 1.5초 후 재시작
        }
    </script>
</body>
</html>
