<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vision Pro AR Ping Pong</title>
    <style>
        :root {
            --apple-font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: var(--apple-font);
            color: white;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        /* 애플 비전프로 스타일의 Glassmorphism UI */
        #vision-panel {
            background: rgba(30, 30, 30, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 400px;
            pointer-events: auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transform: translateY(-20px);
            transition: opacity 0.5s ease;
        }
        h1 {
            font-weight: 600;
            font-size: 24px;
            letter-spacing: 0.5px;
            margin-top: 0;
            margin-bottom: 10px;
        }
        p {
            font-size: 15px;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
        }
        /* ARButton이 생성될 컨테이너 */
        #ar-button-container {
            display: flex;
            justify-content: center;
        }
    </style>
    <!-- Three.js 임포트 (최신버전) -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-layer">
        <div id="vision-panel">
            <h1>Spatial Ping Pong</h1>
            <p>비전프로의 핸드 트래킹을 활용하여 현실 공간에서 직접 탁구채를 휘둘러보세요.<br><br>안전한 공간을 확보한 후 아래 버튼을 눌러 환경을 스캔하세요.</p>
            <div id="ar-button-container"></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        let camera, scene, renderer;
        let controllerGrip1, controllerGrip2;
        
        // 게임 객체
        let table, net, ball;
        let aiPaddle;
        let paddles = []; // 핸드 트래킹 그립(Grip) 기반 패들
        
        // 규격 및 물리 변수
        const ballRadius = 0.02;
        const tableWidth = 1.52;
        const tableLength = 2.74;
        const tableHeight = 0.76;
        const tableZ = -1.5; // 사용자와 조금 더 가깝게

        let ballVelocity = new THREE.Vector3(0, 0, 0);
        const gravity = 9.8;
        let playerScore = 0;
        let aiScore = 0;
        
        // 3D 스코어보드
        let scoreCanvas, scoreContext, scoreTexture, scoreBoard;

        init();

        function init() {
            // 1. 씬 및 카메라
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // 2. 조명 (공간 컴퓨팅에 어울리는 부드럽고 사실적인 조명)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
            dirLight.position.set(2, 4, 1);
            dirLight.castShadow = true;
            scene.add(dirLight);

            // 3. 렌더러 (PBR 및 투명도 지원 강화)
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            renderer.xr.setReferenceSpaceType('local-floor');
            document.body.appendChild(renderer.domElement);

            // 4. Vision Pro 최적화 AR 버튼 (핸드 트래킹 옵션 추가)
            const arButton = ARButton.createButton(renderer, { 
                requiredFeatures: ['local-floor'],
                optionalFeatures: ['hand-tracking'] 
            });
            // 기존 UI 패널 스타일링에 맞게 버튼 텍스트/스타일 오버라이드 (Three.js 기본 버튼을 감쌈)
            arButton.style.position = 'relative';
            arButton.style.bottom = 'auto';
            arButton.style.backgroundColor = '#ffffff';
            arButton.style.color = '#000000';
            arButton.style.borderRadius = '20px';
            arButton.style.padding = '12px 24px';
            arButton.style.fontWeight = '600';
            arButton.style.border = 'none';
            
            document.getElementById('ar-button-container').appendChild(arButton);
            
            arButton.addEventListener('click', () => {
                document.getElementById('vision-panel').style.opacity = '0';
                setTimeout(() => { document.getElementById('vision-panel').style.display = 'none'; }, 500);
            });

            // 5. 오브젝트 및 컨트롤러 생성
            createPremiumGameObjects();
            createScoreBoard();
            setupHandTrackingControllers();

            window.addEventListener('resize', onWindowResize);
            renderer.setAnimationLoop(render);
            resetBall(true);
        }

        // Vision Pro 스타일에 맞는 고급스러운 머티리얼 적용
        function createPremiumGameObjects() {
            // 탁구대 (무광 다크 메탈 느낌)
            const tableGeo = new THREE.BoxGeometry(tableWidth, 0.04, tableLength);
            const tableMat = new THREE.MeshStandardMaterial({ 
                color: 0x222225, 
                roughness: 0.7, 
                metalness: 0.3 
            });
            table = new THREE.Mesh(tableGeo, tableMat);
            table.position.set(0, tableHeight, tableZ);
            scene.add(table);

            // 네트 (Vision Pro의 유리/반투명 질감인 MeshPhysicalMaterial 사용)
            const netGeo = new THREE.BoxGeometry(tableWidth + 0.05, 0.15, 0.015);
            const netMat = new THREE.MeshPhysicalMaterial({
                color: 0xffffff,
                metalness: 0.1,
                roughness: 0.1,
                transmission: 0.8, // 유리 같은 투명도
                thickness: 0.05,
                side: THREE.DoubleSide
            });
            net = new THREE.Mesh(netGeo, netMat);
            net.position.set(0, tableHeight + 0.075, tableZ);
            scene.add(net);

            // 네트 테두리(기둥)
            const poleGeo = new THREE.CylinderGeometry(0.01, 0.01, 0.18);
            const poleMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8, roughness: 0.2 });
            const leftPole = new THREE.Mesh(poleGeo, poleMat);
            leftPole.position.set(-tableWidth / 2, tableHeight + 0.05, tableZ);
            const rightPole = leftPole.clone();
            rightPole.position.set(tableWidth / 2, tableHeight + 0.05, tableZ);
            scene.add(leftPole, rightPole);

            // 공 (밝고 시인성 높은 흰색 무광)
            const ballGeo = new THREE.SphereGeometry(ballRadius, 32, 32);
            const ballMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4 });
            ball = new THREE.Mesh(ballGeo, ballMat);
            scene.add(ball);

            // AI 패들 (매끈한 우주선 느낌의 디자인)
            aiPaddle = createSleekPaddle(0x0a84ff); // Apple Blue
            aiPaddle.position.set(0, tableHeight + 0.2, tableZ - tableLength / 2 - 0.2);
            scene.add(aiPaddle);
        }

        function createScoreBoard() {
            scoreCanvas = document.createElement('canvas');
            scoreCanvas.width = 1024;
            scoreCanvas.height = 256;
            scoreContext = scoreCanvas.getContext('2d');
            
            scoreTexture = new THREE.CanvasTexture(scoreCanvas);
            // 공간에 떠있는 유리 패널 느낌의 스코어보드
            const scoreMat = new THREE.MeshPhysicalMaterial({ 
                map: scoreTexture, 
                transparent: true,
                transmission: 0.2,
                roughness: 0.1,
                clearcoat: 1.0
            });
            const scoreGeo = new THREE.PlaneGeometry(1.5, 0.375);
            scoreBoard = new THREE.Mesh(scoreGeo, scoreMat);
            
            scoreBoard.position.set(0, tableHeight + 0.4, tableZ - tableLength / 2);
            // 사용자 쪽을 살짝 향하게 각도 조절
            scoreBoard.rotation.x = 0.1;
            scene.add(scoreBoard);
            
            updateScoreBoardText();
        }

        function updateScoreBoardText() {
            scoreContext.clearRect(0, 0, scoreCanvas.width, scoreCanvas.height);
            
            // 반투명 배경
            scoreContext.fillStyle = 'rgba(20, 20, 20, 0.6)';
            scoreContext.beginPath();
            scoreContext.roundRect(0, 0, scoreCanvas.width, scoreCanvas.height, 40);
            scoreContext.fill();
            
            scoreContext.fillStyle = '#ffffff';
            scoreContext.font = '700 80px -apple-system, sans-serif';
            scoreContext.textAlign = 'center';
            scoreContext.textBaseline = 'middle';
            scoreContext.fillText(`YOU   ${playerScore}  -  ${aiScore}   AI`, scoreCanvas.width / 2, scoreCanvas.height / 2);
            
            scoreTexture.needsUpdate = true;
        }

        // 비전프로 감성의 심플/미래지향적 패들 생성 함수
        function createSleekPaddle(colorHex) {
            const group = new THREE.Group();

            // 패들 헤드 (타원형, 얇고 매끄러움)
            const headGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.015, 64);
            const headMat = new THREE.MeshStandardMaterial({ 
                color: colorHex, 
                roughness: 0.2,
                metalness: 0.1
            });
            const head = new THREE.Mesh(headGeo, headMat);
            head.rotation.x = Math.PI / 2;
            group.add(head);

            // 패들 그립 (금속 질감)
            const gripGeo = new THREE.CylinderGeometry(0.012, 0.015, 0.12, 32);
            const gripMat = new THREE.MeshStandardMaterial({ 
                color: 0xdddddd, 
                metalness: 0.9, 
                roughness: 0.3 
            });
            const grip = new THREE.Mesh(gripGeo, gripMat);
            grip.position.y = -0.09;
            group.add(grip);

            return group;
        }

        function setupHandTrackingControllers() {
            // 비전프로의 경우 getControllerGrip을 사용하면 손의 위치(손바닥/손목 부근)를 추적할 수 있습니다.
            // 양손 모두 추적하여 편한 손으로 플레이 가능
            controllerGrip1 = renderer.xr.getControllerGrip(0);
            scene.add(controllerGrip1);
            const paddle1 = createSleekPaddle(0xff453a); // Apple Red
            // 손목 방향에 맞게 탁구채 회전 보정
            paddle1.rotation.x = -Math.PI / 3; 
            paddle1.position.z = -0.05; 
            controllerGrip1.add(paddle1);
            paddles.push(controllerGrip1);

            controllerGrip2 = renderer.xr.getControllerGrip(1);
            scene.add(controllerGrip2);
            const paddle2 = createSleekPaddle(0xff453a);
            paddle2.rotation.x = -Math.PI / 3;
            paddle2.position.z = -0.05;
            controllerGrip2.add(paddle2);
            paddles.push(controllerGrip2);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function resetBall(serveToPlayer) {
            ball.position.set(0, tableHeight + 0.4, tableZ);
            
            // 서브 속도 약간 하향 (맨손 트래킹 시 너무 빠르면 치기 어려움)
            const speedZ = serveToPlayer ? 2.0 : -2.0;
            const speedX = (Math.random() - 0.5) * 1.2;
            
            ballVelocity.set(speedX, 0, speedZ);
        }

        let clock = new THREE.Clock();
        let isResetting = false;
        
        // 속도 계산을 위한 이전 프레임 위치 저장 배열
        let previousGripPositions = [new THREE.Vector3(), new THREE.Vector3()];

        function render() {
            const delta = Math.min(clock.getDelta(), 0.05);

            if (!isResetting && renderer.xr.isPresenting) {
                updatePhysics(delta);
                updateAI(delta);
            }

            renderer.render(scene, camera);
        }

        function updatePhysics(delta) {
            // 중력 적용 및 위치 이동
            ballVelocity.y -= gravity * delta;
            ball.position.addScaledVector(ballVelocity, delta);

            // 1. 테이블 충돌
            if (ball.position.y - ballRadius < tableHeight + 0.02 && ballVelocity.y < 0) {
                if (Math.abs(ball.position.x) < tableWidth / 2 && 
                    Math.abs(ball.position.z - tableZ) < tableLength / 2) {
                    
                    ball.position.y = tableHeight + 0.02 + ballRadius;
                    ballVelocity.y = Math.abs(ballVelocity.y) * 0.85; // 탄성
                    ballVelocity.x *= 0.95;
                    ballVelocity.z *= 0.95;
                }
            }

            // 2. 플레이어 패들 (손) 충돌
            paddles.forEach((grip, index) => {
                const padPos = new THREE.Vector3();
                grip.getWorldPosition(padPos);
                
                // 핸드 트래킹 속도 추론
                const handSpeedVec = new THREE.Vector3().subVectors(padPos, previousGripPositions[index]).divideScalar(delta || 0.016);
                previousGripPositions[index].copy(padPos);
                
                // 손(패들)과 공의 거리 체크 (충돌 반경 0.12)
                if (ball.position.distanceTo(padPos) < 0.12 && ballVelocity.z > 0) {
                    
                    // 기본 반발력 + 손이 휘두르는 속도(Z축) 비례
                    let hitPowerZ = Math.abs(ballVelocity.z) * 0.5 + Math.abs(handSpeedVec.z) * 0.2 + 1.5;
                    if(hitPowerZ > 6) hitPowerZ = 6; // 너무 빠른 속도 제한
                    
                    ballVelocity.z = -hitPowerZ;
                    // 위로 띄워주는 힘
                    ballVelocity.y = 2.0 + (handSpeedVec.y > 0 ? handSpeedVec.y * 0.2 : 0); 
                    // 좌우 스핀/방향
                    ballVelocity.x = (ball.position.x - padPos.x) * 8.0 + (handSpeedVec.x * 0.3);
                }
            });

            // 3. AI 패들 충돌
            const aiPos = new THREE.Vector3();
            aiPaddle.getWorldPosition(aiPos);
            
            if (ball.position.distanceTo(aiPos) < 0.12 && ballVelocity.z < 0) {
                ballVelocity.z = Math.abs(ballVelocity.z) + 1.0;
                ballVelocity.y = 2.2; 
                ballVelocity.x = (ball.position.x - aiPos.x) * 6.0;
                if(ballVelocity.z > 5) ballVelocity.z = 5;
            }

            // 4. 네트 충돌 감지 (간단하게 Z축 중앙, Y축 네트 높이 내외일 때 튕겨냄)
            if (Math.abs(ball.position.z - tableZ) < 0.05 && ball.position.y < tableHeight + 0.15 + ballRadius) {
                ballVelocity.z *= -0.5; // 맞고 튕겨 떨어짐
            }

            // 5. 득점 판정
            if (ball.position.y < 0 || Math.abs(ball.position.z - tableZ) > tableLength + 1.5) {
                if (ball.position.z > tableZ) {
                    aiScore++;
                    triggerReset(true);
                } else {
                    playerScore++;
                    triggerReset(false);
                }
                updateScoreBoardText();
            }
        }

        function updateAI(delta) {
            const targetX = ball.position.x;
            
            if (ballVelocity.z < 0) {
                // 부드러운 lerp를 사용하되, 비전프로 프레임레이트에 맞게 수치 조정
                aiPaddle.position.x = THREE.MathUtils.lerp(aiPaddle.position.x, targetX, 0.08);
            } else {
                aiPaddle.position.x = THREE.MathUtils.lerp(aiPaddle.position.x, 0, 0.03);
            }

            const targetY = Math.max(tableHeight + 0.1, ball.position.y);
            aiPaddle.position.y = THREE.MathUtils.lerp(aiPaddle.position.y, targetY, 0.06);
        }

        function triggerReset(serveToPlayer) {
            isResetting = true;
            setTimeout(() => {
                resetBall(serveToPlayer);
                isResetting = false;
            }, 1500);
        }
    </script>
</body>
</html>
