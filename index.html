<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>태양계 3D 체험</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Three.js 및 OrbitControls 라이브러리 로드 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- WebXR VRButton 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/webxr/VRButton.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        /* UI 오버레이 설정: 캔버스 위에 떠 있도록 구성 */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* 클릭 이벤트가 캔버스로 통과하도록 설정 */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .interactive-ui {
            pointer-events: auto; /* UI 요소들은 클릭 가능하도록 설정 */
        }
    </style>
</head>
<body>

    <!-- 3D 캔버스가 렌더링될 컨테이너 -->
    <div id="canvas-container"></div>

    <!-- UI 오버레이 -->
    <div id="ui-layer" class="p-6">
        <!-- 상단 헤더 -->
        <header class="flex justify-between items-start interactive-ui">
            <div class="bg-black/60 backdrop-blur-md border border-white/20 p-5 rounded-2xl shadow-2xl max-w-md">
                <h1 class="text-3xl font-bold mb-2 bg-gradient-to-r from-yellow-300 to-orange-500 bg-clip-text text-transparent">태양계 3D 체험</h1>
                <p class="text-gray-300 text-sm mb-4">마우스 왼쪽 버튼으로 화면을 회전하고, 휠로 확대/축소하세요. 행성을 클릭하면 상세 정보를 볼 수 있습니다.</p>
                
                <!-- 시간 속도 조절 슬라이더 -->
                <div class="mt-4">
                    <label for="speed-slider" class="block text-sm font-medium text-gray-300 mb-2">공전 속도 조절: <span id="speed-value">1x</span></label>
                    <input type="range" id="speed-slider" min="0" max="5" step="0.1" value="1" class="w-full accent-blue-500">
                </div>
            </div>
        </header>

        <!-- 하단 정보 패널 (기본적으로 숨겨짐) -->
        <div class="flex justify-center interactive-ui mb-6">
            <div id="info-panel" class="hidden bg-black/70 backdrop-blur-lg border border-white/30 p-6 rounded-2xl shadow-2xl w-full max-w-2xl transform transition-all duration-300 translate-y-4 opacity-0">
                <div class="flex items-center gap-4 border-b border-white/20 pb-4 mb-4">
                    <div id="info-color" class="w-6 h-6 rounded-full shadow-inner"></div>
                    <h2 id="info-title" class="text-2xl font-bold text-white">행성 이름</h2>
                </div>
                <p id="info-desc" class="text-gray-200 leading-relaxed text-lg">행성에 대한 설명이 여기에 표시됩니다.</p>
                <div class="grid grid-cols-2 gap-4 mt-6 text-sm">
                    <div class="bg-white/10 p-3 rounded-lg">
                        <span class="text-gray-400 block mb-1">태양으로부터의 거리</span>
                        <span id="info-dist" class="font-semibold text-white"></span>
                    </div>
                    <div class="bg-white/10 p-3 rounded-lg">
                        <span class="text-gray-400 block mb-1">상대적 크기</span>
                        <span id="info-size" class="font-semibold text-white"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 전역 변수 선언
        let scene, camera, renderer, controls;
        let time = 0;
        let timeMultiplier = 1;
        
        // 행성 메쉬 및 데이터를 저장할 배열
        const celestialBodies = [];
        
        // 클릭 감지를 위한 Raycaster
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // VR 컨트롤러 관련 변수
        let controller1, controller2;
        let raycasterVR = new THREE.Raycaster();

        // 태양계 천체 데이터 (시각적 효과를 위해 크기와 거리는 실제 비율이 아닌 상대적 비율로 조정됨)
        const planetData = [
            { id: 'sun', name: '태양', color: 0xffcc00, radius: 5, distance: 0, speed: 0, type: 'star', desc: '태양계의 중심에 있는 항성입니다. 막대한 에너지를 방출하여 지구를 비롯한 행성들에 빛과 열을 공급합니다.' },
            { id: 'mercury', name: '수성', color: 0x888888, radius: 0.5, distance: 8, speed: 0.04, type: 'planet', desc: '태양에서 가장 가까운 행성입니다. 대기가 거의 없어 일교차가 매우 큽니다.', realDist: '5,790만 km', realSize: '지구의 0.38배' },
            { id: 'venus', name: '금성', color: 0xe3bb76, radius: 0.95, distance: 11, speed: 0.015, type: 'planet', desc: '가장 밝게 빛나는 행성으로 "샛별"이라고도 불립니다. 두꺼운 이산화탄소 대기 때문에 표면 온도가 매우 높습니다.', realDist: '1억 820만 km', realSize: '지구의 0.95배' },
            { id: 'earth', name: '지구', color: 0x2b82c9, radius: 1, distance: 15, speed: 0.01, type: 'planet', desc: '우리가 살고 있는 푸른 행성입니다. 표면의 70%가 물로 덮여 있으며, 현재까지 생명체가 존재한다고 알려진 유일한 곳입니다.', realDist: '1억 4,960만 km', realSize: '기준 (1배)' },
            { id: 'mars', name: '화성', color: 0xc1440e, radius: 0.53, distance: 19, speed: 0.008, type: 'planet', desc: '표면의 산화철 때문에 붉게 보이는 행성입니다. 과거에 물이 흘렀던 흔적이 있어 제2의 지구 후보로 연구되고 있습니다.', realDist: '2억 2,790만 km', realSize: '지구의 0.53배' },
            { id: 'jupiter', name: '목성', color: 0xd39c7e, radius: 2.5, distance: 26, speed: 0.002, type: 'planet', desc: '태양계에서 가장 큰 가스 행성입니다. 표면에는 거대한 폭풍인 대적점이 존재합니다.', realDist: '7억 7,830만 km', realSize: '지구의 11.2배' },
            { id: 'saturn', name: '토성', color: 0xead6b8, radius: 2.0, distance: 34, speed: 0.0009, type: 'planet', hasRing: true, desc: '얼음과 암석 조각으로 이루어진 아름답고 뚜렷한 고리를 가진 가스 행성입니다.', realDist: '14억 2,700만 km', realSize: '지구의 9.4배' },
            { id: 'uranus', name: '천왕성', color: 0x4b70dd, radius: 1.5, distance: 42, speed: 0.0004, type: 'planet', desc: '자전축이 거의 90도 기울어져 있어 옆으로 누워서 자전하는 독특한 얼음 행성입니다.', realDist: '28억 7,100만 km', realSize: '지구의 4배' },
            { id: 'neptune', name: '해왕성', color: 0x274687, radius: 1.4, distance: 49, speed: 0.0001, type: 'planet', desc: '태양계에서 가장 멀리 있는 푸른색의 얼음 행성입니다. 매우 강한 바람이 붑니다.', realDist: '44억 9,700만 km', realSize: '지구의 3.9배' }
        ];

        // 선택 표시용 링 메쉬
        let selectionRing;

        // 초기화 함수
        function init() {
            // 1. 씬 생성
            scene = new THREE.Scene();
            
            // 배경 별 생성
            createStarfield();

            // 2. 카메라 설정
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 30, 60);

            // 3. 렌더러 설정
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 4. 조명 설정
            // 환경광 (어두운 부분을 살짝 밝혀줌)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
            scene.add(ambientLight);

            // 점광원 (태양의 위치에서 빛을 발산)
            const sunLight = new THREE.PointLight(0xffffff, 2, 300);
            scene.add(sunLight);

            // 5. 천체 생성
            createSolarSystem();

            // 6. 카메라 컨트롤 설정
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxDistance = 200; // 최대 줌아웃 제한
            controls.minDistance = 5;   // 최대 줌인 제한

            // VR 활성화 및 하단에 ENTER VR 버튼 추가
            renderer.xr.enabled = true;
            document.body.appendChild(VRButton.createButton(renderer));

            // VR 컨트롤러 셋업
            setupVRControllers();

            // 7. 이벤트 리스너 등록
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('click', onMouseClick);
            
            // UI 이벤트 등록
            document.getElementById('speed-slider').addEventListener('input', (e) => {
                timeMultiplier = parseFloat(e.target.value);
                document.getElementById('speed-value').textContent = timeMultiplier.toFixed(1) + 'x';
            });
            
            // 선택 표시 링 생성 (초기에는 숨김)
            const ringGeo = new THREE.RingGeometry(1.2, 1.4, 32);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.5 });
            selectionRing = new THREE.Mesh(ringGeo, ringMat);
            selectionRing.rotation.x = Math.PI / 2;
            selectionRing.visible = false;
            scene.add(selectionRing);

            // 8. 애니메이션 루프 시작 (WebXR 환경에 맞게 변경)
            renderer.setAnimationLoop(animate);
        }

        // VR 컨트롤러 설정 함수
        function setupVRControllers() {
            function onSelectStart(event) {
                const controller = event.target;
                const intersections = getIntersections(controller);
                
                if (intersections.length > 0) {
                    const object = intersections[0].object;
                    const data = object.userData;
                    
                    // 선택 링 표시
                    selectionRing.visible = true;
                    selectionRing.scale.set(data.radius, data.radius, data.radius);
                    
                    celestialBodies.forEach(body => {
                        body.isSelected = (body.mesh === object);
                    });
                } else {
                    selectionRing.visible = false;
                    celestialBodies.forEach(body => body.isSelected = false);
                }
            }

            controller1 = renderer.xr.getController(0);
            controller1.addEventListener('selectstart', onSelectStart);
            scene.add(controller1);

            controller2 = renderer.xr.getController(1);
            controller2.addEventListener('selectstart', onSelectStart);
            scene.add(controller2);

            // 컨트롤러에서 나가는 광선(포인터) 시각화
            const geometry = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, 0, 0),
                new THREE.Vector3(0, 0, -1)
            ]);
            const line = new THREE.Line(geometry);
            line.name = 'line';
            line.scale.z = 50; // 광선의 길이
            
            controller1.add(line.clone());
            controller2.add(line.clone());
        }

        // VR 컨트롤러 레이캐스팅 헬퍼
        function getIntersections(controller) {
            const tempMatrix = new THREE.Matrix4();
            tempMatrix.identity().extractRotation(controller.matrixWorld);
            raycasterVR.ray.origin.setFromMatrixPosition(controller.matrixWorld);
            raycasterVR.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);
            
            const meshes = celestialBodies.map(body => body.mesh);
            return raycasterVR.intersectObjects(meshes);
        }

        // 별 배경 생성 함수
        function createStarfield() {
            const starsGeometry = new THREE.BufferGeometry();
            const starsCount = 2000;
            const posArray = new Float32Array(starsCount * 3);

            for(let i = 0; i < starsCount * 3; i++) {
                // -200 부터 200 사이의 랜덤 위치
                posArray[i] = (Math.random() - 0.5) * 400; 
            }

            starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const starsMaterial = new THREE.PointsMaterial({
                size: 0.2,
                color: 0xffffff,
                transparent: true,
                opacity: 0.8
            });

            const starMesh = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(starMesh);
        }

        // 태양계 구성 요소 생성 함수
        function createSolarSystem() {
            const sphereGeometry = new THREE.SphereGeometry(1, 32, 32);

            planetData.forEach((data) => {
                let material;
                
                // 태양은 빛을 내는 기본 재질 사용 (그림자 영향 안받음)
                if (data.type === 'star') {
                    material = new THREE.MeshBasicMaterial({ color: data.color });
                } else {
                    // 행성은 빛에 반응하는 표준 재질 사용
                    material = new THREE.MeshStandardMaterial({ 
                        color: data.color,
                        roughness: 0.7,
                        metalness: 0.1
                    });
                }

                const mesh = new THREE.Mesh(sphereGeometry, material);
                mesh.scale.set(data.radius, data.radius, data.radius);
                
                // userData에 데이터 저장 (클릭 이벤트시 활용)
                mesh.userData = data;

                // 궤도를 그리기 위한 경로 생성
                if (data.distance > 0) {
                    const orbitGeo = new THREE.BufferGeometry();
                    const orbitPoints = [];
                    const segments = 64;
                    for (let i = 0; i <= segments; i++) {
                        const theta = (i / segments) * Math.PI * 2;
                        orbitPoints.push(
                            new THREE.Vector3(Math.cos(theta) * data.distance, 0, Math.sin(theta) * data.distance)
                        );
                    }
                    orbitGeo.setFromPoints(orbitPoints);
                    const orbitMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15 });
                    const orbitLine = new THREE.Line(orbitGeo, orbitMat);
                    scene.add(orbitLine);
                }

                // 토성의 고리 추가
                if (data.hasRing) {
                    const ringGeo = new THREE.RingGeometry(data.radius * 1.4, data.radius * 2.2, 32);
                    const ringMat = new THREE.MeshStandardMaterial({ 
                        color: 0xc9b79b, 
                        side: THREE.DoubleSide,
                        transparent: true,
                        opacity: 0.8
                    });
                    const ringMesh = new THREE.Mesh(ringGeo, ringMat);
                    ringMesh.rotation.x = Math.PI / 2 + 0.2; // 살짝 기울임
                    mesh.add(ringMesh); // 행성 메쉬의 자식으로 추가하여 같이 움직이도록 함
                }

                scene.add(mesh);
                celestialBodies.push({
                    mesh: mesh,
                    data: data,
                    angle: Math.random() * Math.PI * 2 // 시작 위치를 랜덤하게 분산
                });
            });
        }

        // 창 크기 변경 처리 함수
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 마우스 클릭 이벤트 처리 (Raycasting)
        function onMouseClick(event) {
            // UI 요소를 클릭했는지 확인 (canvas 밖 클릭 무시)
            if(event.target.tagName !== 'CANVAS') return;

            // 정규화된 마우스 좌표 계산 (-1 ~ +1)
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            // 카메라와 마우스 위치를 기반으로 광선 발사
            raycaster.setFromCamera(mouse, camera);

            // 메쉬들만 추출
            const meshes = celestialBodies.map(body => body.mesh);
            
            // 교차하는 객체 확인
            const intersects = raycaster.intersectObjects(meshes);

            if (intersects.length > 0) {
                // 가장 가까운 객체 선택
                const selectedObject = intersects[0].object;
                const data = selectedObject.userData;
                
                showInfoPanel(data);
                
                // 선택 링 업데이트
                selectionRing.visible = true;
                selectionRing.scale.set(data.radius, data.radius, data.radius);
                
                // 선택된 객체를 따라가기 위해 userData에 표시
                celestialBodies.forEach(body => {
                    body.isSelected = (body.mesh === selectedObject);
                });
            } else {
                // 허공을 클릭하면 정보 패널 숨김 및 선택 해제
                hideInfoPanel();
                selectionRing.visible = false;
                celestialBodies.forEach(body => body.isSelected = false);
            }
        }

        // UI 정보 패널 표시
        function showInfoPanel(data) {
            const panel = document.getElementById('info-panel');
            
            // 데이터 채우기
            document.getElementById('info-title').textContent = data.name;
            document.getElementById('info-desc').textContent = data.desc;
            
            // 색상 표시
            const colorHex = '#' + data.color.toString(16).padStart(6, '0');
            document.getElementById('info-color').style.backgroundColor = colorHex;
            
            if(data.type === 'planet') {
                document.getElementById('info-dist').textContent = data.realDist;
                document.getElementById('info-size').textContent = data.realSize;
                document.getElementById('info-dist').parentElement.style.display = 'block';
                document.getElementById('info-size').parentElement.style.display = 'block';
            } else {
                // 태양일 경우 거리 정보 숨김
                document.getElementById('info-dist').parentElement.style.display = 'none';
                document.getElementById('info-size').parentElement.style.display = 'none';
            }

            // 애니메이션 클래스 적용하여 보이기
            panel.classList.remove('hidden');
            // 리플로우 강제 유발을 위한 타임아웃
            setTimeout(() => {
                panel.classList.remove('opacity-0', 'translate-y-4');
                panel.classList.add('opacity-100', 'translate-y-0');
            }, 10);
        }

        // UI 정보 패널 숨기기
        function hideInfoPanel() {
            const panel = document.getElementById('info-panel');
            panel.classList.remove('opacity-100', 'translate-y-0');
            panel.classList.add('opacity-0', 'translate-y-4');
            
            setTimeout(() => {
                if(panel.classList.contains('opacity-0')) {
                    panel.classList.add('hidden');
                }
            }, 300); // 트랜지션 시간과 일치
        }

        // 애니메이션 루프
        function animate() {
            // requestAnimationFrame(animate); // WebXR에서는 renderer.setAnimationLoop가 이를 대체합니다.

            // 시간 업데이트
            time += 0.05 * timeMultiplier;

            // 각 행성의 위치 업데이트 (공전 및 자전)
            celestialBodies.forEach((body) => {
                // 공전 (태양 중심 원운동)
                if (body.data.distance > 0 && timeMultiplier > 0) {
                    body.angle -= body.data.speed * timeMultiplier;
                    body.mesh.position.x = Math.cos(body.angle) * body.data.distance;
                    body.mesh.position.z = Math.sin(body.angle) * body.data.distance;
                }

                // 자전 (모든 천체는 스스로 회전함)
                body.mesh.rotation.y += 0.01 * timeMultiplier;
                
                // 선택된 객체가 있다면 링도 같이 이동
                if (body.isSelected) {
                    selectionRing.position.copy(body.mesh.position);
                }
            });

            // 선택 링 회전 애니메이션
            if(selectionRing.visible) {
                selectionRing.rotation.z -= 0.02;
            }

            controls.update(); // OrbitControls 업데이트 (Damping 적용시 필수)
            renderer.render(scene, camera);
        }

        // DOM이 완전히 로드된 후 Three.js 초기화 시작
        window.onload = function() {
            init();
        };
    </script>
</body>
</html>
