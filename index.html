<script>
    // 🔴 중요: 발급받으신 파이어베이스 정보로 아래 내용을 채워주세요!
const firebaseConfig = {
  apiKey: "AIzaSyBZg-wKztuG-Ak7-WqWSAYe9UIj874fYAY",
  authDomain: "heycj-55b6a.firebaseapp.com",
  projectId: "heycj-55b6a",
  storageBucket: "heycj-55b6a.firebasestorage.app",
  messagingSenderId: "147201792706",
  appId: "1:147201792706:web:3b3130a47cd0f50ce5b95b"
};

    // 파이어베이스 초기화
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // 날짜 구하기 공통 함수 (파이어베이스 Today용)
    function getTodayStr() {
        const kstNow = new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Seoul" }));
        const yyyy = kstNow.getFullYear();
        const mm = String(kstNow.getMonth() + 1).padStart(2, '0');
        const dd = String(kstNow.getDate()).padStart(2, '0');
        return `${yyyy}${mm}${dd}`;
    }

    const noticeData = [
        { text: "[⚡내일오픈/마감,긴급정보 실시간 알림 오픈챗 입장하기👆] ", link: "https://open.kakao.com/o/gAUqOrai" },
        { text: "[헤이청주에 ☎️ 협업문의/제안/건의하기] 👆", link: "https://forms.gle/h8KLaLkfsU55aH5T9" },
        { text: "📝간혹 오타가 발생하므로 상세정보확인 페이지 반드시 참고", link: "" },
        { text: "📢[제휴/이벤트 새소식] 총 80만원 상당의 혜택 확인하러가기 👇 ", link: "" }
    ];

    function initNotice() {
        let currentIndex = 0;
        const noticeLink = document.getElementById('notice-link');

        function updateNotice() {
            noticeLink.style.opacity = '0';
            setTimeout(() => {
                const data = noticeData[currentIndex];
                noticeLink.innerText = data.text;
                if (data.link) {
                    noticeLink.href = data.link;
                    noticeLink.target = "_blank";
                    noticeLink.style.cursor = "pointer";
                } else {
                    noticeLink.removeAttribute('href');
                    noticeLink.removeAttribute('target');
                    noticeLink.style.cursor = "default";
                }
                noticeLink.style.opacity = '1';
                currentIndex = (currentIndex + 1) % noticeData.length;
            }, 300);
        }
        updateNotice();
        setInterval(updateNotice, 4000);
    }

    function initLastUpdated() {
        const updateElem = document.getElementById('last-updated-text');
        const lm = new Date(document.lastModified);
        const y = lm.getFullYear();
        const m = lm.getMonth() + 1;
        const d = lm.getDate();
        const h = String(lm.getHours()).padStart(2, '0');
        const min = String(lm.getMinutes()).padStart(2, '0');
        updateElem.innerText = `최근 업데이트: ${y}/${m}/${d} ${h}:${min}`;
    }

    // 🟢 원상복구된 메인 페이지 (Total/Today) 방문자 통계 (이전 무료 API 데이터 연동)
    async function initVisitCounters() {
        const namespace = 'heycheongju_v1'; // 기존과 동일하게 유지하여 데이터 복구
        const todayStr = getTodayStr();

        try {
            const resTotal = await fetch(`https://api.counterapi.dev/v1/${namespace}/total/up`, { cache: 'no-store' });
            const totalJson = await resTotal.json();
            document.getElementById('count-total').innerText = getCounterNumber(totalJson);

            const resToday = await fetch(`https://api.counterapi.dev/v1/${namespace}/today_${todayStr}/up`, { cache: 'no-store' });
            const todayJson = await resToday.json();
            document.getElementById('count-today').innerText = getCounterNumber(todayJson);
        } catch (e) {
            document.getElementById('count-total').innerText = '-';
            document.getElementById('count-today').innerText = '-';
        }
    }

    function getCounterNumber(payload) {
        if (payload == null) return 0;
        if (typeof payload === 'number') return payload;
        if (typeof payload.value === 'number') return payload.value;
        if (typeof payload.count === 'number') return payload.count;
        if (payload.data) {
            if (typeof payload.data.value === 'number') return payload.data.value;
            if (typeof payload.data.count === 'number') return payload.data.count;
        }
        if (typeof payload.value === 'string' && !isNaN(Number(payload.value))) return Number(payload.value);
        if (typeof payload.count === 'string' && !isNaN(Number(payload.count))) return Number(payload.count);
        return 0;
    }

    // ★ 카드별 개별 뷰수 (Firebase 사용 - 1번만 통신해서 전부 가져옴)
    function fetchAllViewCountsSequentially(dataArray) {
        const todayStr = getTodayStr();
        const eventViewsRef = db.ref('event_views/' + todayStr);

        eventViewsRef.once('value').then((snapshot) => {
            const viewsData = snapshot.val() || {}; 

            dataArray.forEach(item => {
                const eventId = String(item['ID'] || item['id'] || item['고유번호'] || item.originalIndex);
                const countElem = document.getElementById(`view-count-${eventId}`);
                if (countElem) {
                    countElem.innerText = viewsData[eventId] || 0;
                }
            });
        }).catch(error => console.error("조회수 로드 에러:", error));
    }

    async function fetchEventData() {
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQV-02F-qXwS6yLb_XScKqwYj1N0qImwofY2Pyj2tvwnW0i1tl995_BjOfaVHpayppk6YYhqpdLrpa9/pub?output=csv";
        const fetchUrl = csvUrl + "&_t=" + new Date().getTime();

        try {
            const response = await fetch(fetchUrl, { cache: 'no-store' });
            if (!response.ok) throw new Error("네트워크 응답이 올바르지 않습니다.");

            const csvText = await response.text();
            eventData = parseCSVToJSON(csvText);

            processEventDates();
            processEventAges();
            generateFilters();
            processNewItems();
            updateTabNewBadges();

            const urlParams = new URLSearchParams(window.location.search);
            const eventId = urlParams.get('id') || urlParams.get('event');

            if (eventId !== null) {
                const targetItem = eventData.find(d => String(d['ID'] || d['id'] || d['고유번호'] || d.originalIndex) === String(eventId));
                if (targetItem && targetItem.type) {
                    document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
                    const targetTabElem = document.querySelector(`.tab[onclick*="${targetItem.type}"]`);
                    if (targetTabElem) targetTabElem.classList.add('active');
                    currentTab = targetItem.type;
                }

            if (eventId !== null) {
                setTimeout(() => {
                    const targetCard = document.getElementById('card-' + eventId);
                    if (targetCard) targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    openEventPopup(eventId);
                }, 300);

            console.error(error);
            document.getElementById('list-container').innerHTML = '<div class="empty-state">행사 정보를 불러오는데 실패했습니다. 새로고침을 해주세요. 😥</div>';
        }
    }

    function parseCSVToJSON(csv) {
        const rows = [];
        let row = [];
        let curr = '';
        let insideQuotes = false;

        for (let i = 0; i < csv.length; i++) {
            const char = csv[i];
            const nextChar = csv[i + 1];

            if (char === '"' && insideQuotes && nextChar === '"') {
                curr += '"';
                i++;
            } else if (char === '"') {
                insideQuotes = !insideQuotes;
            } else if (char === ',' && !insideQuotes) {
                row.push(curr);
                curr = '';
            } else if ((char === '\n' || (char === '\r' && nextChar === '\n')) && !insideQuotes) {
                row.push(curr);
                rows.push(row);
                row = [];
                curr = '';
                if (char === '\r') i++;
            } else {
                curr += char;
            }
        }

        if (curr !== '' || row.length > 0) {
            row.push(curr);
            rows.push(row);
        }

        if (rows.length < 2) return [];

        const headers = rows[0].map(h => h.trim().replace(/[\r\n]+/g, ''));
        const data = [];

        for (let i = 1; i < rows.length; i++) {
            if (rows[i].length === 1 && rows[i][0].trim() === '') continue;
            const obj = {};
            for (let j = 0; j < headers.length; j++) {
                if (headers[j]) obj[headers[j]] = rows[i][j] ? rows[i][j].trim().replace(/[\r\n]+$/, '') : '';
            }
            if (obj.type || obj.title) data.push(obj);
        }
        return data;
    }

    function processEventDates() {
        const today = new Date();
        const tomorrow = new Date(today);
        tomorrow.setDate(tomorrow.getDate() + 1);

        const todayStr = `${today.getMonth() + 1}/${today.getDate()}`;
        const tomorrowStr = `${tomorrow.getMonth() + 1}/${tomorrow.getDate()}`;

        eventData.forEach(item => {
            if (item.type === 'affiliate' || item.type === 'always') {
                item.displayText = item.applyNote;
                return;
            }

            item.isTodayOpen = false;
            item.isTodayClose = false;
            item.isTomorrowOpen = false;
            item.isTomorrowClose = false;

            if (item.applyStart && item.applyStart.includes(todayStr)) item.isTodayOpen = true;
            if (item.applyEnd && item.applyEnd.includes(todayStr)) item.isTodayClose = true;
            if (item.applyStart && item.applyStart.includes(tomorrowStr)) item.isTomorrowOpen = true;
            if (item.applyEnd && item.applyEnd.includes(tomorrowStr)) item.isTomorrowClose = true;

            let text = '';
            if (item.applyStart && item.applyEnd) text = `${item.applyStart} ~ ${item.applyEnd}`;
            else if (item.applyStart) text = `${item.applyStart} 오픈`;
            else if (item.applyEnd) text = `~ ${item.applyEnd}`;

            if (item.applyNote) {
                if (text) text += ` <span style="font-weight:700; font-size:0.8rem;">[${item.applyNote}]</span>`;
                else text = `<span style="font-weight:700;">${item.applyNote}</span>`;
            }

            item.displayText = text || '상시 접수';
        });
    }

    function processEventAges() {
        eventData.forEach(item => {
            const mapped = new Set();
            if (item.ageFilter && item.ageFilter.trim() !== '') {
                item.ageFilter.split(',').forEach(f => {
                    const cleanF = f.trim();
                    if (cleanF) mapped.add(cleanF);
                });
            }
            if (mapped.size === 0) mapped.add('미취학').add('초등').add('중고등').add('성인');
            item.mappedAges = Array.from(mapped);
        });
    }

    function generateFilters() {
        const filterGroup = document.getElementById('combined-filter-group');
        filterGroup.innerHTML = '';

        const presentLocs = new Set();
        const fixedLocs = ['청주', '충북', '대전', '세종', '온라인'];
        const chungbukSubRegions = ['괴산', '음성', '증평', '보은', '옥천', '충주', '제천', '진천', '단양', '영동'];

        eventData.forEach(item => {
            if (item.loc && item.loc.trim() !== '') {
                const locText = item.loc.trim();
                if (chungbukSubRegions.includes(locText) || locText === '충북') item.mappedLoc = '충북';
                else if (fixedLocs.includes(locText)) item.mappedLoc = locText;
                else item.mappedLoc = '기타';
                presentLocs.add(item.mappedLoc);
            } else {
                item.mappedLoc = null;
            }
        });

        const ageFilters = ['미취학', '초등', '중고등', '성인'];
        ageFilters.forEach((age, index) => {
            const id = `age-dynamic-${index}`;
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.id = id;
            checkbox.value = age;
            checkbox.className = 'filter-cb age-cb';
            checkbox.onchange = applyFilters;

            const label = document.createElement('label');
            label.htmlFor = id;
            label.className = 'cb-label age-label';
            label.innerText = age;

            filterGroup.appendChild(checkbox);
            filterGroup.appendChild(label);
        });

        if (presentLocs.size > 0) {
            const divider = document.createElement('span');
            divider.innerText = '|';
            divider.style.color = '#ccc';
            divider.style.display = 'flex';
            divider.style.alignItems = 'center';
            divider.style.fontSize = '0.7rem';
            divider.style.margin = '0 2px';
            filterGroup.appendChild(divider);
        }

        const orderedLocs = [...fixedLocs, '기타'];
        orderedLocs.forEach((loc, index) => {
            if (presentLocs.has(loc)) {
                const id = `loc-dynamic-${index}`;
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.id = id;
                checkbox.value = loc;
                checkbox.className = 'filter-cb loc-cb';
                checkbox.onchange = applyFilters;

                const label = document.createElement('label');
                label.htmlFor = id;
                label.className = 'cb-label';
                label.innerText = loc;

                filterGroup.appendChild(checkbox);
                filterGroup.appendChild(label);
            }
        });

        setTimeout(() => handleFilterScroll(filterGroup), 100);
    }

    function parseDateValue(dateStr) {
        if (!dateStr) return 9999;
        let match = dateStr.match(/(\d{1,2})\/(\d{1,2})/);
        if (match) return parseInt(match[1]) * 100 + parseInt(match[2]);
        match = dateStr.match(/(\d{1,2})월\s*(\d{1,2})일/);
        if (match) return parseInt(match[1]) * 100 + parseInt(match[2]);
        match = dateStr.match(/(\d{1,2})월/);
        if (match) return parseInt(match[1]) * 100;
        return 9999;
    }

    function parseRegDate(dateStr) {
        if (!dateStr) return 0;
        let s = String(dateStr).trim();
        let match = s.match(/(\d{4})[./-]\s*(\d{1,2})[./-]\s*(\d{1,2})(?:[.\s]+(?:오전|오후|AM|PM)?\s*(\d{1,2})[:시]\s*(\d{1,2}))?/i);
        if (match) {
            let year = parseInt(match[1], 10);
            let month = parseInt(match[2], 10) - 1;
            let day = parseInt(match[3], 10);
            let hour = match[4] ? parseInt(match[4], 10) : 0;
            let minute = match[5] ? parseInt(match[5], 10) : 0;

            if (s.includes('오후') || s.toUpperCase().includes('PM')) {
                if (hour < 12) hour += 12;
            }
            if ((s.includes('오전') || s.toUpperCase().includes('AM')) && hour === 12) {
                hour = 0;
            }
            return new Date(year, month, day, hour, minute).getTime();
        }

        let parsed = new Date(s).getTime();
        return isNaN(parsed) ? 0 : parsed;
    }

    function processNewItems() {
        const now = Date.now();
        const ONE_DAY = 24 * 60 * 60 * 1000;

        eventData.forEach((item, index) => {
            item.originalIndex = index;
            item.isNew = false;

            const regDateMs = parseRegDate(item['등록일']);
            if (regDateMs > 0) {
                const timeDiff = now - regDateMs;
                if (timeDiff >= -ONE_DAY && timeDiff <= ONE_DAY) item.isNew = true;
            }
            if (item['N숨김'] === 'O' || item['N숨김'] === 'o') item.isNew = false;
        });
    }

    function updateTabNewBadges() {
        const tabs = ['ongoing', 'always', 'affiliate'];
        tabs.forEach(tabType => {
            const hasNew = eventData.some(item => item.type === tabType && item.isNew);
            const tabElement = document.querySelector(`.tab[onclick*="${tabType}"]`);
            if (!tabElement) return;
            const existingBadge = tabElement.querySelector('.new-badge');
            if (hasNew) {
                if (!existingBadge) tabElement.insertAdjacentHTML('beforeend', '<span class="new-badge">N</span>');
            } else {
                if (existingBadge) existingBadge.remove();
            }
        });
    }

    function changeTab(element, type) {
        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        element.classList.add('active');
        currentTab = type;
        applyFilters();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function applyFilters() {
        const selectedLocs = Array.from(document.querySelectorAll('.loc-cb:checked')).map(cb => cb.value);
        const selectedAges = Array.from(document.querySelectorAll('.age-cb:checked')).map(cb => cb.value);
        const keyword = document.getElementById('search-input').value.trim().toLowerCase();
        const container = document.getElementById('list-container');

        if (eventData.length === 0) return;

        let filteredData = eventData.filter(item => {
            const matchTab = keyword ? true : (item.type === currentTab);
            const matchLoc = selectedLocs.length === 0 ? true : selectedLocs.some(loc => item.mappedLoc === loc);
            const matchAge = selectedAges.length === 0 ? true : selectedAges.some(age => item.mappedAges && item.mappedAges.includes(age));

            let matchSearch = true;
            if (keyword) {
                matchSearch =
                    (item.title && item.title.toLowerCase().includes(keyword)) ||
                    (item.place && item.place.toLowerCase().includes(keyword)) ||
                    (item.loc && item.loc.toLowerCase().includes(keyword));
            }

            return matchTab && matchLoc && matchAge && matchSearch;
        });

        if (currentTab === 'ongoing' || keyword) {
            filteredData.sort((a, b) => {
                if (a.isNew !== b.isNew) return b.isNew ? 1 : -1;

                const getPriority = (item) => {
                    if (item.isTodayOpen) return 1;
                    if (item.isTodayClose) return 2;
                    if (item.isTomorrowClose) return 3;
                    return 4;
                };

                const pA = getPriority(a);
                const pB = getPriority(b);
                if (pA !== pB) return pA - pB;

                return parseDateValue(a.applyEnd) - parseDateValue(b.applyEnd);
            });
        } else if (currentTab === 'always' || currentTab === 'affiliate') {
            filteredData.sort((a, b) => {
                if (a.isNew !== b.isNew) return b.isNew ? 1 : -1;
                return a.originalIndex - b.originalIndex;
            });
        }

        if (filteredData.length === 0) {
            container.innerHTML = '<div class="empty-state">해당하는 행사가 없습니다. 조건이나 검색어를 변경해 보세요! 😥</div>';
            return;
        }

        let htmlBuffer = '';

        filteredData.forEach(item => {
            let safeCost = item.costType || '비용정보 없음';
            if (safeCost === '해당정보 없음') safeCost = '비용정보 없음';

            let costBadgeClass = 'badge-info';
            if (safeCost.includes('무료')) costBadgeClass = 'badge-free';
            else if (safeCost.includes('유료')) costBadgeClass = 'badge-paid';

            let dateBadges = '';
            if (item.isTodayOpen) dateBadges += `<span class="badge badge-open">오늘오픈</span> `;
            if (item.isTodayClose) dateBadges += `<span class="badge badge-today">오늘마감</span> `;
            if (item.isTomorrowOpen && !item.isTodayOpen) dateBadges += `<span class="badge badge-open" style="background-color:#ff9800;">내일오픈</span> `;
            if (item.isTomorrowClose && !item.isTodayClose) dateBadges += `<span class="badge badge-close">내일마감</span> `;

            let cardClass = 'card';
            let overlayHTML = '';
            const statusVal = item['커밍순'] ? item['커밍순'].replace(/\s+/g, '') : '';
            if (statusVal === '커밍순') {
                cardClass += ' disabled-card';
                overlayHTML = `<div class="status-overlay"><div class="status-stamp">COMING SOON</div></div>`;
            } else if (statusVal === '마감') {
                cardClass += ' disabled-card';
                overlayHTML = `<div class="status-overlay"><div class="status-stamp closed">마감</div></div>`;
            }

            const eventUniqueId = String(item['ID'] || item['id'] || item['고유번호'] || item.originalIndex);

            // 🌟 카드 하단에 장소/일정 정보 추가
            const cardHTML = `
                <div class="${cardClass}" id="card-${eventUniqueId}" onclick="openEventPopup('${eventUniqueId}')">
                    ${overlayHTML}
                    <div class="card-header">
                        <div class="badges">
                            ${dateBadges}
                            <span class="badge badge-loc">${item.loc || ''}</span>
                            <span class="badge badge-age">${item.age || ''}</span>
                            <span class="badge ${costBadgeClass}">${safeCost}</span>
                        </div>
                    </div>
                    <div class="card-title-row">
                        <h2 class="title">${item.title || ''} ${item.isNew ? `<span class="card-new-badge">N</span>` : ''}</h2>

                        <div class="card-action-area">
                            <div class="card-action-top">
                                <span class="view-count" title="조회수">
                                    <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                                    <span id="view-count-${eventUniqueId}">...</span>
                                </span>
                            </div>
                            <span class="card-more-text">+ 더보기</span>
                        </div>
                    </div>
                    
                    <div class="card-bottom-info">
                        <span>📍 ${item.place ? item.place : '장소 정보 없음'}</span>
                        <span>🗓️ ${item.date ? item.date : '일정 정보 없음'}</span>
                    </div>
                </div>
            `;
            htmlBuffer += cardHTML;
        });

        container.innerHTML = htmlBuffer;

        // 개별 카드 로딩 후 파이어베이스 기반 조회수 호출
        fetchAllViewCountsSequentially(filteredData);
    }

    async function openEventPopup(eventId) {
        const item = eventData.find(d => String(d['ID'] || d['id'] || d['고유번호'] || d.originalIndex) === String(eventId));
        if (!item) return;

        // ★ 파이어베이스 팝업 조회수 증가 (클릭 즉시 +1)
        try {
            const todayStr = getTodayStr();
            const specificEventRef = db.ref(`event_views/${todayStr}/${eventId}`);
            
            specificEventRef.set(firebase.database.ServerValue.increment(1)).then(() => {
                specificEventRef.once('value').then(snap => {
                    const countElem = document.getElementById(`view-count-${eventId}`);
                    if (countElem) countElem.innerText = snap.val() || 0;
                });
            });
        } catch (e) {
            console.log('조회수 카운트 에러', e);
        }

        document.getElementById('popupTitle').innerHTML = `${item.title || ''} ${item.isNew ? `<span class="card-new-badge">N</span>` : ''}`;
        document.getElementById('popupShareBtn').setAttribute('onclick', `sharePopupLink('${eventId}')`);

        let applyTextStyle = 'color:var(--text-sub);';
        if (item.isTodayClose) applyTextStyle = 'color:#E53935; font-weight:700;';

        // 🌟 팝업 상단 이미지 데이터 연동 ('이미지' 열 값 확인)
        let popupImgHtml = '';
        const popupImgUrl = item['이미지'] || item.image || ''; 
        if (popupImgUrl && popupImgUrl.trim() !== '') {
            popupImgHtml = `
                <div class="popup-img-container">
                    <img src="${popupImgUrl.trim()}" alt="행사 썸네일" />
                </div>
            `;
        }

        document.getElementById('popupBody').innerHTML = `
            ${popupImgHtml}
            <div class="info-row"><div class="info-label">장소</div><div class="info-desc">${item.place || '정보 없음'}</div></div>
            <div class="info-row"><div class="info-label">비용</div><div class="info-desc">${item.costType || '정보 없음'}</div></div>
            <div class="info-row"><div class="info-label">접수</div><div class="info-desc" style="${applyTextStyle}">${item.displayText || ''}</div></div>
            <div class="info-row"><div class="info-label">일정</div><div class="info-desc">${item.date || '해당정보 없음'}</div></div>
            ${item.applyNote ? `<div class="info-row"><div class="info-label">참고사항</div><div class="info-desc" style="font-weight:bold; color:var(--text-main);">${item.applyNote}</div></div>` : ''}
        `;

        let btnDetails = '';
        const detailUrl = item.link || item['링크'];
        let isImageUrl = false;

        if (detailUrl && detailUrl.trim() !== '') {
            const lowerUrl = detailUrl.trim().toLowerCase();
            isImageUrl =
                /\.(jpeg|jpg|gif|png|webp)(?:[\?#].*)?$/i.test(lowerUrl) ||
                lowerUrl.includes('drive.google.com/uc?') ||
                lowerUrl.includes('phinf.pstatic.net');
        }

        if (detailUrl && detailUrl.trim() !== '') {
            const safeUrl = detailUrl.trim().replace(/"/g, '&quot;');
            const trackTitle = (item.title || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
            if (isImageUrl) {
                btnDetails = `<button type="button" class="btn-link btn-img-modal" data-url="${safeUrl}" data-title="${trackTitle}">관련 사이트 🖼️</button>`;
            } else {
                btnDetails = `<a href="${safeUrl}" onclick="trackEventAndOpen(event, '${safeUrl}', '${trackTitle}', 'detail')" class="btn-link">관련 사이트 🔗</a>`;
            }
        } else {
            btnDetails = `<button type="button" class="btn-link btn-disabled" onclick="alert('등록된 상세정보 링크가 없습니다.');">사이트 정보 없음</button>`;
        }

        let btnApply = '';
        const rawApplyValue = item['신청링크'] || item.applyLink;

        if (rawApplyValue && rawApplyValue.trim() !== '') {
            const cleanValue = rawApplyValue.trim();
            const safeApplyValue = cleanValue.replace(/"/g, '&quot;');
            const alertSafeValue = cleanValue.replace(/'/g, "\\'").replace(/"/g, '\\"');
            const trackTitle = (item.title || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
            const isUrl = /^(https?:\/\/|www\.|javascript:)/i.test(cleanValue);

            if (isUrl) {
                let actualUrl = safeApplyValue;
                if (cleanValue.toLowerCase().startsWith('www.')) actualUrl = `http://${safeApplyValue}`;
                btnApply = `<a href="${actualUrl}" onclick="trackEventAndOpen(event, '${actualUrl}', '${trackTitle}', 'apply')" class="btn-link">예약하기 🔗</a>`;
            } else {
                btnApply = `<button type="button" class="btn-link btn-disabled" onclick="alert('${alertSafeValue}');">${safeApplyValue}</button>`;
            }
        } else {
            btnApply = `<button type="button" class="btn-link btn-disabled" onclick="alert('사전예약 링크가 필요 없는 현장접수 행사입니다.');">현장접수</button>`;
        }

        document.getElementById('popupFooter').innerHTML = `${btnDetails}${btnApply}`;
        document.getElementById('eventModal').classList.add('active');

        try {
            history.pushState({ eventPopup: true }, '', '?id=' + encodeURIComponent(eventId));
        } catch (e) {
            console.log("로컬 환경이라 URL이 변경되지 않습니다.");
        }
    }

    function closeEventPopup(e) {
        if (e && e.target !== e.currentTarget && !e.target.classList.contains('event-modal-close-btn')) return;
        document.getElementById('eventModal').classList.remove('active');
        try {
            history.pushState(null, '', window.location.pathname);
        } catch (e) {}
    }

    document.addEventListener('DOMContentLoaded', () => {
        initNotice();
        initLastUpdated();
        initVisitCounters(); // 기존 무료 API 연동 (메인 방문자 수)
        fetchEventData();    // 카드 로딩 후 파이어베이스로 개별 조회수 연동
    });
</script>
</body>
</html>
