<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR 화학 분자 학습</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000; /* VR 진입 전 배경 */
        }

        /* WebXR DOM 오버레이 UI 스타일 */
        #ui-overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            color: white;
            text-align: center;
            display: none; /* AR 진입 전에 숨김 */
            pointer-events: auto;
            z-index: 10;
        }

        /* AR 버튼이 활성화된 상태에서만 UI 표시 (DOM Overlay) */
        :xr-overlay #ui-overlay {
            display: block;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        p {
            margin: 0 0 15px 0;
            font-size: 1rem;
            opacity: 0.9;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            background: rgba(0, 122, 255, 0.8);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1.1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        button:hover {
            background: rgba(0, 122, 255, 1);
            transform: translateY(-2px);
        }

        button.active {
            background: rgba(52, 199, 89, 0.9);
            box-shadow: 0 0 15px rgba(52, 199, 89, 0.6);
        }

        .clear-btn {
            background: rgba(255, 59, 48, 0.8);
        }
        .clear-btn:hover {
            background: rgba(255, 59, 48, 1);
        }

        /* 초기 화면 안내 문구 */
        #start-info {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            z-index: 1;
            width: 80%;
        }
    </style>
</head>
<body>

    <!-- 초기 화면 안내 -->
    <div id="start-info">
        <h2>AR 화학 분자 학습</h2>
        <p>화면 하단의 <strong>'AR ENTER'</strong> 버튼을 눌러 패스스루 모드를 시작하세요.<br>(메타퀘스트 브라우저 권장)</p>
    </div>

    <!-- AR 모드 진입 시 표시될 UI (DOM Overlay) -->
    <div id="ui-overlay">
        <h1>🧪 3D 분자 구조 학습</h1>
        <p>선택 후, 컨트롤러의 트리거를 당겨 허공에 분자를 배치하세요.</p>
        <div class="button-group">
            <button id="btn-h2o" class="mol-btn active" data-mol="H2O">물 (H₂O)</button>
            <button id="btn-co2" class="mol-btn" data-mol="CO2">이산화탄소 (CO₂)</button>
            <button id="btn-ch4" class="mol-btn" data-mol="CH4">메테인 (CH₄)</button>
            <button id="btn-clear" class="clear-btn">모두 지우기</button>
        </div>
    </div>

    <!-- Three.js 및 WebXR 관련 라이브러리 로드 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        let camera, scene, renderer;
        let controller;
        let currentMoleculeType = 'H2O';
        const spawnedMolecules = []; // 생성된 분자들을 저장할 배열

        // 분자 구조 데이터 정의 (미터 단위: 0.1 = 10cm)
        const MOLECULES = {
            'H2O': {
                atoms: [
                    { x: 0, y: 0, z: 0, color: 0xff0000, radius: 0.04, name: 'Oxygen' }, // 산소 (빨강)
                    { x: 0.06, y: -0.04, z: 0, color: 0xffffff, radius: 0.025, name: 'Hydrogen' }, // 수소 (흰색)
                    { x: -0.06, y: -0.04, z: 0, color: 0xffffff, radius: 0.025, name: 'Hydrogen' } // 수소 (흰색)
                ],
                bonds: [ [0, 1], [0, 2] ] // 원자 인덱스 연결
            },
            'CO2': {
                atoms: [
                    { x: 0, y: 0, z: 0, color: 0x222222, radius: 0.04, name: 'Carbon' }, // 탄소 (검정/회색)
                    { x: 0.12, y: 0, z: 0, color: 0xff0000, radius: 0.04, name: 'Oxygen' }, // 산소 (빨강)
                    { x: -0.12, y: 0, z: 0, color: 0xff0000, radius: 0.04, name: 'Oxygen' } // 산소 (빨강)
                ],
                bonds: [ [0, 1], [0, 2] ]
            },
            'CH4': {
                atoms: [
                    { x: 0, y: 0, z: 0, color: 0x222222, radius: 0.04, name: 'Carbon' }, // 탄소
                    { x: 0, y: 0.08, z: 0, color: 0xffffff, radius: 0.025, name: 'Hydrogen' }, // 상단 수소
                    { x: 0.075, y: -0.03, z: 0, color: 0xffffff, radius: 0.025, name: 'Hydrogen' }, // 우측 하단
                    { x: -0.037, y: -0.03, z: 0.065, color: 0xffffff, radius: 0.025, name: 'Hydrogen' }, // 좌측 앞 하단
                    { x: -0.037, y: -0.03, z: -0.065, color: 0xffffff, radius: 0.025, name: 'Hydrogen' } // 좌측 뒤 하단
                ],
                bonds: [ [0, 1], [0, 2], [0, 3], [0, 4] ]
            }
        };

        init();
        animate();

        function init() {
            // 1. 씬 및 카메라 설정
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // 2. 조명 설정 (현실 공간에 어울리도록 설정)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
            directionalLight.position.set(10, 20, 10);
            scene.add(directionalLight);

            // 3. 렌더러 설정 (AR을 위해 투명 배경 alpha: true 필수)
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true; // WebXR 활성화
            document.body.appendChild(renderer.domElement);

            // 4. AR 버튼 추가 및 DOM Overlay 설정
            // DOM 오버레이를 사용하면 AR 환경 안에서 HTML UI를 터치/클릭할 수 있습니다.
            const uiOverlay = document.getElementById('ui-overlay');
            const arButton = ARButton.createButton(renderer, { 
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: uiOverlay } 
            });
            document.body.appendChild(arButton);

            // AR 진입 시 안내 문구 숨기기
            renderer.xr.addEventListener('sessionstart', () => {
                document.getElementById('start-info').style.display = 'none';
                uiOverlay.style.display = 'block'; // 강제 표시
            });
            renderer.xr.addEventListener('sessionend', () => {
                document.getElementById('start-info').style.display = 'block';
                uiOverlay.style.display = 'none';
            });

            // 5. 컨트롤러 설정 (사용자가 트리거를 당겼을 때 반응)
            controller = renderer.xr.getController(0);
            controller.addEventListener('select', onSelect);
            scene.add(controller);

            // 화면 리사이즈 처리
            window.addEventListener('resize', onWindowResize);

            // 6. UI 버튼 이벤트 리스너 설정
            setupUI();
        }

        // UI 버튼 클릭 이벤트 처리
        function setupUI() {
            const molButtons = document.querySelectorAll('.mol-btn');
            molButtons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    // 모든 버튼 활성화 해제 후 현재 버튼만 활성화
                    molButtons.forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    // 선택된 분자 타입 변경
                    currentMoleculeType = e.target.getAttribute('data-mol');
                });
            });

            document.getElementById('btn-clear').addEventListener('click', () => {
                // 생성된 모든 분자 삭제
                spawnedMolecules.forEach(mol => {
                    scene.remove(mol);
                    // 메모리 해제
                    mol.traverse((child) => {
                        if (child.isMesh) {
                            child.geometry.dispose();
                            child.material.dispose();
                        }
                    });
                });
                spawnedMolecules.length = 0;
            });
        }

        // 분자 3D 모델 생성 함수
        function createMoleculeModel(type) {
            const data = MOLECULES[type];
            const group = new THREE.Group();
            const atomMeshes = [];

            // 공통 재질 특성
            const materialOptions = { roughness: 0.3, metalness: 0.1, clearcoat: 0.5 };

            // 원자(구) 생성
            data.atoms.forEach(atom => {
                const geometry = new THREE.SphereGeometry(atom.radius, 32, 32);
                const material = new THREE.MeshPhysicalMaterial({ color: atom.color, ...materialOptions });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(atom.x, atom.y, atom.z);
                group.add(mesh);
                atomMeshes.push(mesh);
            });

            // 결합(원기둥) 생성
            data.bonds.forEach(bond => {
                const startNode = atomMeshes[bond[0]].position;
                const endNode = atomMeshes[bond[1]].position;
                
                const distance = startNode.distanceTo(endNode);
                // 결합의 두께
                const geometry = new THREE.CylinderGeometry(0.008, 0.008, distance, 12);
                const material = new THREE.MeshPhysicalMaterial({ color: 0xaaaaaa, roughness: 0.4 });
                const cylinder = new THREE.Mesh(geometry, material);
                
                // 결합의 위치를 두 원자의 중간으로 설정
                cylinder.position.copy(startNode);
                cylinder.position.lerp(endNode, 0.5);
                
                // 원기둥의 방향을 두 원자가 연결되는 방향으로 회전
                cylinder.quaternion.setFromUnitVectors(
                    new THREE.Vector3(0, 1, 0), 
                    endNode.clone().sub(startNode).normalize()
                );
                
                group.add(cylinder);
            });

            // 전체 크기를 보기 좋게 조정
            group.scale.set(1.5, 1.5, 1.5);
            return group;
        }

        // 컨트롤러의 트리거를 당겼을 때 실행되는 함수
        function onSelect() {
            // 선택된 타입의 분자 모델 생성
            const molecule = createMoleculeModel(currentMoleculeType);
            
            // 컨트롤러의 위치와 방향을 분자에 적용
            molecule.position.copy(controller.position);
            molecule.rotation.copy(controller.rotation);
            
            // 컨트롤러 앞쪽(Z축의 음수 방향)으로 30cm 띄워서 배치
            molecule.translateZ(-0.3);

            scene.add(molecule);
            spawnedMolecules.push(molecule);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 렌더링 루프 (애니메이션)
        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render() {
            // 배치된 모든 분자들이 천천히 회전하도록 애니메이션 부여
            spawnedMolecules.forEach(mol => {
                mol.rotation.x += 0.005;
                mol.rotation.y += 0.008;
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
