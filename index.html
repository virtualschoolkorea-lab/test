<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가상현실 공기 분자 관찰기</title>
    <!-- A-Frame 라이브러리 로드 (Vision Pro 최적화를 위해 1.5.0 버전업) -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #canvas-container { display: none; }
    </style>
    <script>
        // 분자 데이터 정의
        const MOLECULE_DATA = {
            'n2': { name: '질소 (Nitrogen)', formula: 'N₂', ratio: '약 78%', color: '#1E90FF', desc: '지구 대기의 대부분을 차지하는 무색, 무취의 기체입니다. 반응성이 낮아 안정적입니다.', draw: drawN2 },
            'o2': { name: '산소 (Oxygen)', formula: 'O₂', ratio: '약 21%', color: '#FF4500', desc: '동식물의 호흡에 필수적인 기체이며, 물질이 타는 연소 반응을 돕습니다.', draw: drawO2 },
            'ar': { name: '아르곤 (Argon)', formula: 'Ar', ratio: '약 0.93%', color: '#9370DB', desc: '다른 물질과 거의 반응하지 않는 비활성 기체입니다. 전구 내부의 충전재로 쓰입니다.', draw: drawAr },
            'co2': { name: '이산화탄소 (Carbon Dioxide)', formula: 'CO₂', ratio: '약 0.04%', color: '#A9A9A9', desc: '식물의 광합성에 사용되며, 온실효과를 일으키는 주요 온실가스 중 하나입니다.', draw: drawCO2 },
            'h2o': { name: '수증기 (Water Vapor)', formula: 'H₂O', ratio: '다양함 (0~4%)', color: '#FFFFFF', desc: '기상 현상(구름, 비, 눈)을 일으키는 핵심 역할을 하며, 강력한 온실가스이기도 합니다.', draw: drawH2O }
        };

        // 2D 캔버스에 분자 구조를 그리는 함수들 (대시보드 용)
        function drawN2(ctx, cx, cy) {
            drawAtom(ctx, cx - 40, cy, 30, MOLECULE_DATA['n2'].color, 'N');
            drawAtom(ctx, cx + 40, cy, 30, MOLECULE_DATA['n2'].color, 'N');
            drawBond(ctx, cx - 20, cy - 10, cx + 20, cy - 10);
            drawBond(ctx, cx - 20, cy, cx + 20, cy);
            drawBond(ctx, cx - 20, cy + 10, cx + 20, cy + 10);
        }
        function drawO2(ctx, cx, cy) {
            drawAtom(ctx, cx - 40, cy, 30, MOLECULE_DATA['o2'].color, 'O');
            drawAtom(ctx, cx + 40, cy, 30, MOLECULE_DATA['o2'].color, 'O');
            drawBond(ctx, cx - 20, cy - 5, cx + 20, cy - 5);
            drawBond(ctx, cx - 20, cy + 5, cx + 20, cy + 5);
        }
        function drawAr(ctx, cx, cy) {
            drawAtom(ctx, cx, cy, 40, MOLECULE_DATA['ar'].color, 'Ar');
        }
        function drawCO2(ctx, cx, cy) {
            drawAtom(ctx, cx - 80, cy, 30, MOLECULE_DATA['o2'].color, 'O');
            drawAtom(ctx, cx, cy, 35, MOLECULE_DATA['co2'].color, 'C');
            drawAtom(ctx, cx + 80, cy, 30, MOLECULE_DATA['o2'].color, 'O');
            drawBond(ctx, cx - 55, cy - 5, cx - 25, cy - 5);
            drawBond(ctx, cx - 55, cy + 5, cx - 25, cy + 5);
            drawBond(ctx, cx + 25, cy - 5, cx + 55, cy - 5);
            drawBond(ctx, cx + 25, cy + 5, cx + 55, cy + 5);
        }
        function drawH2O(ctx, cx, cy) {
            drawAtom(ctx, cx, cy - 20, 35, MOLECULE_DATA['o2'].color, 'O');
            drawAtom(ctx, cx - 60, cy + 40, 20, MOLECULE_DATA['h2o'].color, 'H', '#000');
            drawAtom(ctx, cx + 60, cy + 40, 20, MOLECULE_DATA['h2o'].color, 'H', '#000');
            drawBond(ctx, cx - 15, cy - 5, cx - 45, cy + 25);
            drawBond(ctx, cx + 15, cy - 5, cx + 45, cy + 25);
        }
        function drawAtom(ctx, x, y, radius, color, label, labelColor='#FFF') {
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = labelColor;
            ctx.font = 'bold 24px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(label, x, y);
        }
        function drawBond(ctx, x1, y1, x2, y2) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = '#FFF';
            ctx.lineWidth = 4;
            ctx.stroke();
        }

        // 한국어 텍스트 자동 줄바꿈 함수
        function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
            const words = text.split(' ');
            let line = '';
            for(let n = 0; n < words.length; n++) {
                const testLine = line + words[n] + ' ';
                const metrics = ctx.measureText(testLine);
                const testWidth = metrics.width;
                if (testWidth > maxWidth && n > 0) {
                    ctx.fillText(line, x, y);
                    line = words[n] + ' ';
                    y += lineHeight;
                } else {
                    line = testLine;
                }
            }
            ctx.fillText(line, x, y);
        }

        // 대시보드 캔버스 업데이트 (A-Frame 텍스처용)
        function updateDashboard(type) {
            const canvas = document.getElementById('dashboardCanvas');
            const ctx = canvas.getContext('2d');
            const data = MOLECULE_DATA[type];

            // 배경 초기화
            ctx.fillStyle = '#111827';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 테두리
            ctx.strokeStyle = '#3B82F6';
            ctx.lineWidth = 10;
            ctx.strokeRect(5, 5, canvas.width - 10, canvas.height - 10);

            if (!data) {
                ctx.fillStyle = '#60A5FA';
                ctx.font = 'bold 45px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('공기 분자를 쳐다보고 핀치(손가락 맞대기)하거나', canvas.width/2, canvas.height/2 - 30);
                ctx.fillText('클릭하여 관찰해보세요.', canvas.width/2, canvas.height/2 + 30);
            } else {
                ctx.textAlign = 'left';
                // 제목 영역
                ctx.fillStyle = '#3B82F6';
                ctx.fillRect(10, 10, canvas.width - 20, 100);
                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 60px sans-serif';
                ctx.fillText(data.name, 40, 80);

                // 정보 영역
                ctx.fillStyle = '#93C5FD';
                ctx.font = 'bold 40px sans-serif';
                ctx.fillText('화학식:', 40, 180);
                ctx.fillText('대기 비율:', 40, 250);
                
                ctx.fillStyle = '#FFFFFF';
                ctx.font = '40px sans-serif';
                ctx.fillText(data.formula, 220, 180);
                ctx.fillText(data.ratio, 250, 250);

                // 설명
                ctx.fillStyle = '#D1D5DB';
                ctx.font = '35px sans-serif';
                wrapText(ctx, data.desc, 40, 340, canvas.width - 80, 50);

                // 시각적 구조 영역 (하단 박스)
                ctx.fillStyle = '#1F2937';
                ctx.fillRect(40, 500, canvas.width - 80, 450);
                ctx.fillStyle = '#93C5FD';
                ctx.font = 'bold 35px sans-serif';
                ctx.fillText('화학 구조식', 60, 550);

                // 구조식 그리기
                data.draw(ctx, canvas.width / 2, 750);
            }

            // A-Frame 재질 업데이트 트리거
            const dashboardEl = document.getElementById('dashboard-plane');
            if (dashboardEl && dashboardEl.components.material && dashboardEl.components.material.material.map) {
                dashboardEl.components.material.material.map.needsUpdate = true;
            }
        }

        // 컴포넌트: 분자 클릭 이벤트 처리
        AFRAME.registerComponent('clickable-molecule', {
            schema: { type: { type: 'string', default: 'n2' } },
            init: function () {
                const el = this.el;
                const type = this.data.type;

                // 마우스 오버 효과 (스케일업)
                el.addEventListener('mouseenter', function () {
                    el.setAttribute('scale', '1.5 1.5 1.5');
                });
                el.addEventListener('mouseleave', function () {
                    el.setAttribute('scale', '1 1 1');
                });

                // 클릭 시 대시보드 업데이트 및 애니메이션
                el.addEventListener('click', function () {
                    updateDashboard(type);
                    
                    // 클릭한 분자 회전 애니메이션
                    el.setAttribute('animation__click', {
                        property: 'rotation',
                        dir: 'alternate',
                        dur: 500,
                        to: `${Math.random()*360} ${Math.random()*360} ${Math.random()*360}`,
                        loop: 2
                    });

                    // 사운드 피드백 (간단한 햅틱/비프 대체용)
                    const raycasterEls = document.querySelectorAll('[raycaster]');
                    raycasterEls.forEach(rayEl => {
                        if(rayEl.components['haptics']) rayEl.components['haptics'].pulse(0.5, 100);
                    });
                });
            }
        });

        // 컴포넌트: 무작위 떠다니기 애니메이션
        AFRAME.registerComponent('float-behavior', {
            init: function () {
                this.speed = {
                    x: (Math.random() - 0.5) * 0.01,
                    y: (Math.random() - 0.5) * 0.01,
                    z: (Math.random() - 0.5) * 0.01
                };
                this.rotSpeed = {
                    x: (Math.random() - 0.5) * 1,
                    y: (Math.random() - 0.5) * 1,
                    z: (Math.random() - 0.5) * 1
                };
            },
            tick: function () {
                const el = this.el;
                const pos = el.getAttribute('position');
                const rot = el.getAttribute('rotation');

                pos.x += this.speed.x;
                pos.y += this.speed.y;
                pos.z += this.speed.z;

                rot.x += this.rotSpeed.x;
                rot.y += this.rotSpeed.y;
                rot.z += this.rotSpeed.z;

                // 영역 벗어나면 반대편으로 이동 (공간 크기: -5 ~ 5, Y는 0 ~ 5)
                if (pos.x > 5) pos.x = -5; if (pos.x < -5) pos.x = 5;
                if (pos.y > 5) pos.y = 0;  if (pos.y < 0) pos.y = 5;
                if (pos.z > 5) pos.z = -5; if (pos.z < -5) pos.z = 5;

                el.setAttribute('position', pos);
                el.setAttribute('rotation', rot);
            }
        });

        // 씬 로드 시 분자 생성 및 대시보드 초기화
        window.addEventListener('load', () => {
            // 초기 대시보드 렌더링
            updateDashboard(null);

            const scene = document.querySelector('a-scene');
            const moleculeCounts = { 'n2': 78, 'o2': 21, 'ar': 5, 'co2': 5, 'h2o': 5 }; // 교육 목적 시각화를 위한 조정된 비율
            const atomSize = 0.15; // 기본 구 크기

            Object.keys(moleculeCounts).forEach(type => {
                const count = moleculeCounts[type];
                const data = MOLECULE_DATA[type];

                for (let i = 0; i < count; i++) {
                    const moleculeEl = document.createElement('a-entity');
                    
                    // 무작위 초기 위치
                    const posX = (Math.random() - 0.5) * 10;
                    const posY = Math.random() * 4 + 0.5;
                    const posZ = (Math.random() - 0.5) * 10;
                    moleculeEl.setAttribute('position', `${posX} ${posY} ${posZ}`);
                    moleculeEl.setAttribute('rotation', `${Math.random()*360} ${Math.random()*360} ${Math.random()*360}`);
                    
                    // 컴포넌트 추가
                    moleculeEl.classList.add('clickable');
                    moleculeEl.setAttribute('clickable-molecule', `type: ${type}`);
                    moleculeEl.setAttribute('float-behavior', '');

                    // 시각적 3D 모델 조립
                    if (type === 'n2' || type === 'o2') {
                        createAtom(moleculeEl, -atomSize*0.8, 0, 0, atomSize, data.color);
                        createAtom(moleculeEl, atomSize*0.8, 0, 0, atomSize, data.color);
                    } else if (type === 'ar') {
                        createAtom(moleculeEl, 0, 0, 0, atomSize * 1.2, data.color);
                    } else if (type === 'co2') {
                        createAtom(moleculeEl, 0, 0, 0, atomSize, data.color); // C
                        createAtom(moleculeEl, -atomSize*2, 0, 0, atomSize*0.9, MOLECULE_DATA['o2'].color); // O
                        createAtom(moleculeEl, atomSize*2, 0, 0, atomSize*0.9, MOLECULE_DATA['o2'].color); // O
                    } else if (type === 'h2o') {
                        createAtom(moleculeEl, 0, 0, 0, atomSize, MOLECULE_DATA['o2'].color); // O
                        createAtom(moleculeEl, -atomSize*1.2, -atomSize, 0, atomSize*0.6, data.color); // H
                        createAtom(moleculeEl, atomSize*1.2, -atomSize, 0, atomSize*0.6, data.color); // H
                    }

                    // 클릭을 쉽게 하기 위한 투명한 충돌 감지 구역 추가
                    const hitBox = document.createElement('a-sphere');
                    hitBox.setAttribute('radius', '0.4');
                    hitBox.setAttribute('material', 'visible: false');
                    moleculeEl.appendChild(hitBox);

                    scene.appendChild(moleculeEl);
                }
            });
        });

        // 원자 생성 헬퍼 함수
    function createAtom(parentEl, x, y, z, radius, color) {
        const sphere = document.createElement('a-sphere');
        sphere.setAttribute('position', `${x} ${y} ${z}`);
        sphere.setAttribute('radius', radius);
        sphere.setAttribute('color', color);
        sphere.setAttribute('material', 'metalness: 0.3; roughness: 0.4');
        parentEl.appendChild(sphere);
    }
</script>
</head>
<body>
    <!-- 동적 한국어 텍스트 생성을 위한 숨겨진 캔버스 -->
    <div id="canvas-container">
        <canvas id="dashboardCanvas" width="1024" height="1024"></canvas>
    </div>

    <!-- AR 패스스루(주변 환경 보임)를 위해 배경색 제거 및 WebXR 옵션 추가 -->
    <a-scene webxr="referenceSpaceType: local-floor; optionalFeatures: hit-test;">
        <!-- 리소스 (캔버스를 텍스처로 사용) -->
        <a-assets>
            <canvas id="dashboardCanvas"></canvas>
        </a-assets>

        <!-- 환경: 현실 바닥이 보이도록 가상 바닥(floorGrid) 제거, 조명만 유지 -->
        <a-light type="ambient" color="#FFF" intensity="0.8"></a-light>
        <a-light type="directional" position="2 4 3" color="#FFF" intensity="0.6"></a-light>

        <!-- 메인 대시보드 (학습 패널) -->
        <a-plane id="dashboard-plane" position="0 2 -4" width="3" height="3" material="shader: flat; src: #dashboardCanvas; transparent: true">
        </a-plane>

        <!-- 사용자 카메라 및 Vision Pro / 핸드 트래킹 최적화 컨트롤러 설정 -->
        <a-entity position="0 0 2">
            <a-camera></a-camera>

            <!-- Vision Pro 시선+핀치 및 Quest 핸드 트래킹 핀치 지원 -->
            <a-entity cursor="rayOrigin: xrselect" raycaster="objects: .clickable"></a-entity>
            <!-- 데스크톱 마우스 클릭 지원 -->
            <a-entity cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>
        </a-entity>

    </a-scene>
</body>
</html>
