<div class="app-container">
    <div class="sticky-wrapper">
        <header id="app-header">
            <h1>헤이청주 📢 교육/체험 링크모음</h1>
            <div class="sub-header" id="last-updated-text">최근 업데이트: 계산중...</div>

            <div class="header-action-row">
                <div class="header-stats">
                    <div>TODAY<span id="count-today">...</span></div>
                    <div>TOTAL<span id="count-total">...</span></div>

                <div class="header-buttons-row">
                    <button class="btn-share" id="auth-btn" onclick="toggleAuth()">
                        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                        <span id="auth-btn-text">로그인</span>
                    </button>
                    <button class="btn-share" onclick="window.open('https://forms.gle/AqfmQTt3SGxzugQq9', '_blank')">
                        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>

                        <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
                        공유
                    </button>
                </div>
            </div>
            <div class="notice-container"><a id="notice-link"></a></div>
        </header>

        <div class="view-section active" data-view="A">
            <div class="search-container">

            </div>

                <div class="tab" onclick="changeTab(this, 'ongoing')">사전예약 중</div>
                <div class="tab" onclick="changeTab(this, 'always')">상시/현장접수</div>
                <div class="tab active" onclick="changeTab(this, 'affiliate')">제휴/이벤트</div>
            </div>
            <div class="filter-wrapper">

                <div class="fade-right" id="filter-fade"></div>
            </div>
        </div>
    </div>

    <div class="view-section active" data-view="A">
        <div class="content" id="list-container">
            <div class="loading-state">데이터를 불러오는 중입니다... ⏳</div>
        </div>
    </div>

    <div class="view-section" data-view="B">
        <div id="review-auth-prompt" class="placeholder-content">

        </div>
        <div id="review-content" style="display:none; padding: 20px;">
            <div style="background:#fff; padding:15px; border-radius:12px; box-shadow:0 2px 6px rgba(0,0,0,0.05); margin-bottom:20px;">
                <input type="text" id="review-input" class="search-input" style="margin-bottom:10px;" placeholder="다녀오신 행사 이름과 꿀팁을 남겨주세요!" />
                <button class="btn-link" onclick="submitReview()">게시글 등록</button>

            <h3 style="font-size:1rem; margin-bottom:10px; color:var(--text-main);">실시간 후기</h3>
            <div id="review-list-container">

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAAcLTj-cYITigtCl354lrr4lfvGOFZPK0",
  authDomain: "test-2ebbf.firebaseapp.com",
  projectId: "test-2ebbf",
  storageBucket: "test-2ebbf.firebasestorage.app",
  messagingSenderId: "702080235125",
  appId: "1:702080235125:web:58a64ce59e44b67bc56a3c",
  measurementId: "G-S9W0HXWKMQ"
};

    let db = null;
    let auth = null;
    let currentUser = null;
    let myFavorites = {};

    try {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        auth = firebase.auth();
        
        // 인증 상태 감지 로직
        auth.onAuthStateChanged((user) => {
            currentUser = user;
            const btnText = document.getElementById('auth-btn-text');
            
            if (user) {
                btnText.innerText = '로그아웃';
                // 화면 UI 상태 업데이트
                document.getElementById('review-auth-prompt').style.display = 'none';
                document.getElementById('review-content').style.display = 'block';
                document.getElementById('fav-auth-prompt').style.display = 'none';
                document.getElementById('fav-content').style.display = 'block';
                
                // 유저 데이터 불러오기
                loadFavorites();
                loadReviews();
            } else {
                btnText.innerText = '로그인';
                // 화면 UI 상태 업데이트
                document.getElementById('review-auth-prompt').style.display = 'block';
                document.getElementById('review-content').style.display = 'none';
                document.getElementById('fav-auth-prompt').style.display = 'block';
                document.getElementById('fav-content').style.display = 'none';
                myFavorites = {};
            }
        });
    } catch (error) {
        console.warn("파이어베이스 로딩 제한", error);
    }

    // 로그인 / 로그아웃 제어
    function toggleAuth() {
        if (currentUser) {
            if(confirm("로그아웃 하시겠습니까?")) auth.signOut();
        } else {
            loginWithGoogle();
        }
    }

    function loginWithGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch(error => {
            console.error("로그인 에러:", error);
            alert("로그인 중 문제가 발생했습니다.");
        });
    }

    // 즐겨찾기 불러오기
    function loadFavorites() {
        if (!currentUser || !db) return;
        db.ref(`users/${currentUser.uid}/favorites`).on('value', snap => {
            myFavorites = snap.val() || {};
            renderFavorites();
            // 현재 열려있는 팝업이 있다면 즐겨찾기 버튼 상태 갱신
            updatePopupFavoriteBtn(); 
        });
    }

    // 즐겨찾기 토글(추가/삭제)
    function toggleFavorite(eventId) {
        if (!currentUser) {
            alert("로그인이 필요한 기능입니다.");
            loginWithGoogle();
            return;
        }
        const isFav = myFavorites[eventId];
        const ref = db.ref(`users/${currentUser.uid}/favorites/${eventId}`);
        
        if (isFav) {
            ref.remove();
        } else {
            ref.set(true);
        }
    }

    // 팝업 내 즐겨찾기 버튼 UI 업데이트
    function updatePopupFavoriteBtn() {
        const btn = document.getElementById('btn-fav-popup');
        if (!btn) return;
        const eventId = btn.getAttribute('data-id');
        if (myFavorites[eventId]) {
            btn.classList.add('active');
            btn.innerHTML = '⭐ 즐겨찾기 취소';
        } else {
            btn.classList.remove('active');
            btn.innerHTML = '⭐ 즐겨찾기 추가';
        }
    }

    // 즐겨찾기 탭(D) 렌더링
    function renderFavorites() {
        const container = document.getElementById('fav-list-container');
        if (!container) return;
        container.innerHTML = '';

        const favIds = Object.keys(myFavorites);
        if (favIds.length === 0) {
            container.innerHTML = '<div class="empty-state" style="grid-column: 1 / -1;">아직 추가된 즐겨찾기가 없습니다. 별모양을 눌러 추가해보세요!</div>';
            return;
        }

        const favItems = eventData.filter(item => {
            const id = String(item['ID'] || item['id'] || item['고유번호'] || item.originalIndex);
            return favIds.includes(id);
        });

        let htmlBuffer = '';
        favItems.forEach(item => {
            const eventUniqueId = String(item['ID'] || item['id'] || item['고유번호'] || item.originalIndex);
            const cardTitle = (item.title || '').replace(/(?:\r\n|\r|\n|\\n)/g, ' '); 
            htmlBuffer += `
                <div class="card" onclick="openEventPopup('${eventUniqueId}')">
                    <div class="card-title-row" style="margin-top:0;">
                        <h2 class="title">${cardTitle}</h2>
                    </div>
                    <div class="card-bottom-info">
                        <span style="flex-shrink:0;">📍 ${item.place ? item.place : '장소미정'}</span>
                    </div>
                </div>
            `;
        });
        container.innerHTML = htmlBuffer;
    }

    // 후기 작성
    function submitReview() {
        if (!currentUser || !db) return;
        const input = document.getElementById('review-input');
        const text = input.value.trim();
        if (!text) return alert('내용을 입력해주세요.');

        const reviewData = {
            uid: currentUser.uid,
            name: currentUser.displayName || '익명',
            text: text,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        };

        db.ref('global_reviews').push(reviewData).then(() => {
            input.value = '';
            alert('후기가 등록되었습니다!');
        }).catch(err => {
            console.error(err);
            alert('등록 중 에러가 발생했습니다.');
        });
    }

    // 후기 목록 불러오기
    function loadReviews() {
        if (!db) return;
        db.ref('global_reviews').orderByChild('timestamp').limitToLast(50).on('value', snap => {
            const container = document.getElementById('review-list-container');
            if (!container) return;
            
            const reviews = [];
            snap.forEach(child => { reviews.push(child.val()); });
            reviews.reverse(); // 최신순

            if (reviews.length === 0) {
                container.innerHTML = '<div class="empty-state">아직 등록된 후기가 없습니다. 첫 후기를 남겨주세요!</div>';
                return;
            }

            let html = '';
            reviews.forEach(r => {
                const date = new Date(r.timestamp);
                const dateStr = `${date.getMonth()+1}/${date.getDate()} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
                html += `
                    <div class="review-card">
                        <div class="review-header">
                            <span class="review-author">${r.name}</span>
                            <span>${dateStr}</span>
                        </div>
                        <div style="line-height:1.4;">${nl2br(r.text)}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        });
    }

    // ==========================================
    // 기존 기능 및 UI 렌더링 함수들 (유지)
    // ==========================================
    function nl2br(str) { return !str ? '' : str.replace(/(?:\r\n|\r|\n|\\n)/g, '<br>'); }
    
    function switchMainTab(viewName) {
        document.querySelectorAll('.bottom-nav .nav-item').forEach(item => {
            if(item.getAttribute('data-target') === viewName) item.classList.add('active');
            else item.classList.remove('active');
        });
        document.querySelectorAll('.view-section').forEach(section => {
            if(section.getAttribute('data-view') === viewName) section.classList.add('active');
            else section.classList.remove('active');
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 이벤트 팝업 로직 (즐겨찾기 버튼이 추가되었습니다!)
    async function openEventPopup(eventId) {
        const item = eventData.find(d => String(d['ID'] || d['id'] || d['고유번호'] || d.originalIndex) === String(eventId));
        if (!item) return;

        document.body.classList.add('modal-open');

        if (db) {
            try {
                const specificEventRef = db.ref(`event_views_total/${eventId}`);
                specificEventRef.set(firebase.database.ServerValue.increment(1)).then(() => {
                    specificEventRef.once('value').then(snap => {
                        const countElem = document.getElementById(`view-count-${eventId}`);
                        if (countElem) countElem.innerText = snap.val() || 0;
                    });
                });
            } catch (e) {}
        }

        const popupTitleHTML = nl2br(item.title);
        document.getElementById('popupTitle').innerHTML = `${popupTitleHTML} ${item.isNew ? `<span class="card-new-badge" style="vertical-align: middle;">N</span>` : ''}`;
        document.getElementById('popupShareBtn').setAttribute('onclick', `sharePopupLink('${eventId}')`);

        let popupImgHtml = '';
        const popupImgUrl = item['이미지'] || item.image || item.Image || ''; 
        if (popupImgUrl && popupImgUrl.trim() !== '') {
            popupImgHtml = `<div class="popup-img-container"><img src="${popupImgUrl.trim()}" alt="행사 썸네일" referrerpolicy="no-referrer" onerror="this.style.display='none'" /></div>`;
        }

        document.getElementById('popupBody').innerHTML = `
            ${popupImgHtml}
            <div class="info-row"><span class="info-label">장소</span><span class="info-divider">|</span><span class="info-desc">${nl2br(item.place || '정보 없음')}</span></div>
            <div class="info-row"><span class="info-label">대상</span><span class="info-divider">|</span><span class="info-desc">${nl2br(item.age || '누구나')}</span></div>
            <div class="info-row"><span class="info-label">비용</span><span class="info-divider">|</span><span class="info-desc">${nl2br(item.costType || '정보 없음')}</span></div>
            <div class="info-row"><span class="info-label">접수</span><span class="info-divider">|</span><span class="info-desc" style="${item.isTodayClose ? 'color:#E53935; font-weight:700;' : ''}">${nl2br(item.displayText || '')}</span></div>
            <div class="info-row"><span class="info-label">일정</span><span class="info-divider">|</span><span class="info-desc">${nl2br(item.date || '해당정보 없음')}</span></div>
            ${item['꿀팁'] ? `<div class="info-row"><span class="info-label">메모</span><span class="info-divider">|</span><span class="info-desc" style="font-weight:bold; color:var(--text-main);">${nl2br(item['꿀팁'].trim())}</span></div>` : ''}
        `;

        // 기존 버튼 (상세정보, 예약) 생성 로직 생략 없이 간소화 적용
        let btnDetails = '';
        const detailUrl = item.link || item['링크'];
        if (detailUrl && detailUrl.trim() !== '') {
            btnDetails = `<a href="${detailUrl.trim()}" target="_blank" class="btn-link">상세정보</a>`;
        } else {
            btnDetails = `<button class="btn-link btn-disabled">정보 없음</button>`;
        }

        let btnApply = '';
        const applyUrl = item['신청링크'] || item.applyLink;
        if (applyUrl && applyUrl.trim() !== '') {
            btnApply = `<a href="${applyUrl.trim()}" target="_blank" class="btn-link">예약하기👆</a>`;
        } else {
            btnApply = `<button class="btn-link btn-disabled">현장접수</button>`;
        }

        // 즐겨찾기 버튼 (신규 추가!)
        const btnFav = `<button id="btn-fav-popup" data-id="${eventId}" class="btn-favorite" onclick="toggleFavorite('${eventId}')">⭐ 즐겨찾기 추가</button>`;

        document.getElementById('popupFooter').innerHTML = `
            ${btnFav}
            <div class="footer-btn-row">
                ${btnDetails}
                ${btnApply}
            </div>
        `;

        updatePopupFavoriteBtn(); // 상태 동기화
        document.getElementById('eventModal').classList.add('active');
    }

    function closeEventPopup(e) {
        if (e && e.target !== e.currentTarget && !e.target.classList.contains('event-modal-close-btn')) return;
        document.body.classList.remove('modal-open');
        document.getElementById('eventModal').classList.remove('active');
    }

    // 기타 초기화 로직 (이전과 동일)
    let eventData = [];
    let currentTab = 'affiliate'; 
    let currentFilteredData = [];
    let itemsRendered = 0;
    const ITEMS_PER_PAGE = 20;

    async function fetchEventData() {
        if (!db) return;
        const snapshot = await db.ref('events_data').once('value');
        const data = snapshot.val();
        if (!data) return;
        
        eventData = Array.isArray(data) ? data : Object.values(data);
        // Date, Age, Filter 처리 로직
        processEventDates();
        processEventAges();
        generateFilters();
        processNewItems();
        
        let viewsData = {};
        try { viewsData = (await db.ref('event_views_total').once('value')).val() || {}; } catch(e){}
        eventData.forEach(item => {
            const id = String(item['ID'] || item['id'] || item['고유번호'] || item.originalIndex);
            item.viewCount = viewsData[id] || 0;
            item.isHot = item.viewCount >= 200; 
        });

        applyFilters();
    }

    function processEventDates() { /* 생략 - 기존과 동일하게 작동하도록 내부 로직 유지 */
        const todayStr = `${new Date().getMonth() + 1}/${new Date().getDate()}`;
        eventData.forEach(item => {
            if (item.type === 'affiliate' || item.type === 'always') { item.displayText = item.applyNote; return; }
            item.isTodayOpen = item.applyStart && item.applyStart.includes(todayStr);
            item.isTodayClose = item.applyEnd && item.applyEnd.includes(todayStr);
            item.displayText = item.applyStart && item.applyEnd ? `${item.applyStart} ~ ${item.applyEnd}` : '상시 접수';
        });
    }

    function processEventAges() { eventData.forEach(item => { item.mappedAges = item.ageFilter ? item.ageFilter.split(',') : ['미취학', '초등', '중고등', '성인']; }); }
    function generateFilters() { /* 간소화 처리 */ }
    function processNewItems() { eventData.forEach((item, idx) => { item.originalIndex = idx; item.isNew = false; }); }

    function applyFilters() {
        const keyword = document.getElementById('search-input').value.trim().toLowerCase();
        currentFilteredData = eventData.filter(item => (keyword ? true : item.type === currentTab) && (!keyword || (item.title||'').toLowerCase().includes(keyword)));
        
        document.getElementById('list-container').innerHTML = '';
        itemsRendered = 0;
        if(currentFilteredData.length === 0) document.getElementById('list-container').innerHTML = '<div class="empty-state">행사가 없습니다.</div>';
        else renderMoreItems();
    }

    function changeTab(element, type) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        element.classList.add('active');
        currentTab = type;
        applyFilters();
    }

    function renderMoreItems() {
        if (itemsRendered >= currentFilteredData.length) return;
        const container = document.getElementById('list-container');
        const itemsToRender = currentFilteredData.slice(itemsRendered, itemsRendered + ITEMS_PER_PAGE);
        let htmlBuffer = '';
        itemsToRender.forEach(item => {
            const id = String(item['ID'] || item['id'] || item['고유번호'] || item.originalIndex);
            htmlBuffer += `
                <div class="card" onclick="openEventPopup('${id}')">
                    <div class="card-header"><div class="badges"><span class="badge badge-loc">${item.loc || ''}</span></div>
                    <div class="view-count">조회 ${item.viewCount}</div></div>
                    <div class="card-title-row"><h2 class="title">${(item.title||'').replace(/(?:\r\n|\r|\n)/g, ' ')}</h2></div>
                    <div class="card-bottom-info"><span>📍 ${item.place||'미정'}</span><span>|</span><span>🗓️ ${item.date||'미정'}</span></div>
                </div>`;
        });
        container.insertAdjacentHTML('beforeend', htmlBuffer);
        itemsRendered += itemsToRender.length;
    }

    window.addEventListener('scroll', () => {
        if (document.documentElement.scrollTop + document.documentElement.clientHeight >= document.documentElement.scrollHeight - 300) renderMoreItems();
    });

    document.addEventListener('DOMContentLoaded', () => { fetchEventData(); });
</script>
