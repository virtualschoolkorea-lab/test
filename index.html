    let eventData = []; let currentSubTab = 'affiliate'; let currentFilteredData = []; let itemsRendered = 0; const ITEMS_PER_PAGE = 20;
    
    async function fetchEventData() {
        if (!db) return;
        const snap = await db.ref('events_data').once('value'); const data = snap.val(); if(!data) return;
        eventData = Array.isArray(data) ? data : Object.values(data);
        
        // 날짜 파싱 및 우선순위용 속성
        const t = new Date(); const tm = new Date(t); tm.setDate(tm.getDate()+1); 
        const tStr = `${t.getMonth()+1}/${t.getDate()}`; const tmStr = `${tm.getMonth()+1}/${tm.getDate()}`;
        
        eventData.forEach((i, idx) => {
            i.originalIndex = idx;
            if (i.type === 'affiliate' || i.type === 'always') { i.displayText = i.applyNote; } 
            else {
                i.isTodayOpen = i.applyStart && i.applyStart.includes(tStr); i.isTodayClose = i.applyEnd && i.applyEnd.includes(tStr);

        });

        eventData.forEach(item => { const id = String(item['ID'] || item['id'] || item['고유번호'] || item.originalIndex); item.viewCount = viewsData[id] || 0; item.isHot = item.viewCount >= 200; });
        
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('id') || urlParams.get('event');
        if (eventId) {
            const targetItem = eventData.find(d => String(d['ID'] || d['id'] || d['고유번호'] || d.originalIndex) === String(eventId));
            if (targetItem && targetItem.type) {
                document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));

    }

    function parseDateValue(dateStr) { if (!dateStr) return 99999999; let s = String(dateStr).trim(); let match = s.match(/(\d{4})[-./]\s*(\d{1,2})[-./]\s*(\d{1,2})/); if (match) return parseInt(match[1]) * 10000 + parseInt(match[2]) * 100 + parseInt(match[3]); match = s.match(/(\d{2})[-./]\s*(\d{1,2})[-./]\s*(\d{1,2})/); if (match) return (parseInt(match[1]) + 2000) * 10000 + parseInt(match[2]) * 100 + parseInt(match[3]); const t = new Date(); match = s.match(/(\d{1,2})\/(\d{1,2})/); if (match) return t.getFullYear() * 10000 + parseInt(match[1]) * 100 + parseInt(match[2]); match = s.match(/(\d{1,2})월\s*(\d{1,2})일/); if (match) return t.getFullYear() * 10000 + parseInt(match[1]) * 100 + parseInt(match[2]); return 99999999; }
    function parseRegDate(dateStr) { if (!dateStr) return 0; let s = String(dateStr).trim(); let match = s.match(/(\d{4})[./-]\s*(\d{1,2})[./-]\s*(\d{1,2})/i); if (match) return new Date(parseInt(match[1], 10), parseInt(match[2], 10) - 1, parseInt(match[3], 10)).getTime(); return new Date(s).getTime() || 0; }
    
    function generateFilters() { const fg = document.getElementById('combined-filter-group'); fg.innerHTML=''; const pLocs = new Set(); const fLocs = ['청주', '충북', '대전', '세종', '온라인']; eventData.forEach(i => { if(i.loc){ const l = i.loc.trim(); i.mappedLoc = fLocs.includes(l) ? l : '기타'; pLocs.add(i.mappedLoc); }else i.mappedLoc = null; }); ['미취학', '초등', '중고등', '성인'].forEach((a,i) => { fg.innerHTML += `<input type="checkbox" id="age-${i}" value="${a}" class="filter-cb age-cb" onchange="applyFilters()"><label for="age-${i}" class="cb-label age-label">${a}</label>`; }); if(pLocs.size>0) fg.innerHTML += `<span style="color:#ccc; margin:0 4px;">|</span>`; [...fLocs, '기타'].forEach((l,i) => { if(pLocs.has(l)) fg.innerHTML += `<input type="checkbox" id="loc-${i}" value="${l}" class="filter-cb loc-cb" onchange="applyFilters()"><label for="loc-${i}" class="cb-label">${l}</label>`; }); }
    function changeSubTab(el, t) { document.querySelectorAll('.tab').forEach(tb => tb.classList.remove('active')); el.classList.add('active'); currentSubTab = t; applyFilters(); }
    
    function applyFilters() {
        const sLocs = Array.from(document.querySelectorAll('.loc-cb:checked')).map(c=>c.value); const sAges = Array.from(document.querySelectorAll('.age-cb:checked')).map(c=>c.value); const kw = document.getElementById('search-input').value.trim().toLowerCase();
        currentFilteredData = eventData.filter(i => {
            const mT = kw ? true : i.type === currentSubTab; const mL = sLocs.length===0 ? true : sLocs.some(l => i.mappedLoc === l); const mA = sAges.length===0 ? true : sAges.some(a => i.mappedAges && i.mappedAges.includes(a));
            const mS = kw ? ((i.title||'').toLowerCase().includes(kw) || (i.place||'').toLowerCase().includes(kw)) : true;
            return mT && mL && mA && mS;
        });

        if (currentSubTab === 'ongoing' || kw) { currentFilteredData.sort((a,b) => { if(a.isHot && !b.isHot) return -1; if(!a.isHot && b.isHot) return 1; const getP = i => { if(i.isTodayOpen) return 1; if(i.isTodayClose) return 2; if(i.isTomorrowOpen) return 3; if(i.isTomorrowClose) return 4; if(i.isNew) return 5; return 6; }; const pA = getP(a); const pB = getP(b); if(pA!==pB) return pA-pB; return parseDateValue(a.applyEnd) - parseDateValue(b.applyEnd); }); } 
        else if (currentSubTab === 'always') { currentFilteredData.sort((a,b) => { if(a.isHot && !b.isHot) return -1; if(!a.isHot && b.isHot) return 1; if(a.isNew && !b.isNew) return -1; if(!a.isNew && b.isNew) return 1; const dA = parseDateValue(a['행사마감일']||a.eventEnd); const dB = parseDateValue(b['행사마감일']||b.eventEnd); if(dA!==dB) return dA-dB; return a.originalIndex - b.originalIndex; }); } 
        else { currentFilteredData.sort((a,b) => { if(a.isHot && !b.isHot) return -1; if(!a.isHot && b.isHot) return 1; if(a.isNew && !b.isNew) return -1; if(!a.isNew && b.isNew) return 1; return a.originalIndex - b.originalIndex; }); }

        itemsRendered = 0; document.getElementById('list-container').innerHTML = currentFilteredData.length===0 ? '<div class="empty-state">해당하는 행사가 없습니다.</div>' : '';
        renderMoreItems();
    }

    function submitReview(eventId) {
        if (!currentLogNick) return toggleLoginModal();
        const content = document.getElementById('rvContent').value.trim(); 
        const kakao = document.getElementById('rvKakao').value.trim();
        const isCompanion = document.getElementById('compWrap').style.display === 'flex' && kakao.length > 0;
        
        if(!content) return alert("내용을 입력해주세요.");
        if(isCompanion && !kakao.includes('open.kakao')) return alert("올바른 카카오톡 링크를 입력하세요.");

        const btn = document.querySelector('.btn-submit-review'); btn.innerText = '...'; btn.disabled = true;
        
        const fd = new URLSearchParams();
        fd.append('action', 'create'); fd.append('eventId', eventId); fd.append('nickname', currentLogNick); fd.append('password', currentLogPass); fd.append('content', content); fd.append('isCompanion', isCompanion); fd.append('kakaoLink', kakao);

        fetch(scriptUrl, { method: 'POST', body: fd }).then(()=>{
            document.getElementById('rvContent').value = ''; document.getElementById('rvKakao').value=''; 
            document.getElementById('compWrap').style.display='none'; document.getElementById('btnCompOpen').style.display='block';
        }).finally(() => { btn.innerText = '등록'; btn.disabled = false; });

    function submitFeed() {

        const place = document.getElementById('feedPlace').value.trim(); const date = document.getElementById('feedDate').value.trim(); const age = document.getElementById('feedAge').value.trim(); const review = document.getElementById('feedReview').value.trim();

        if(!place || !review) return alert("방문장소와 한줄평은 필수입니다!");

        const btn = document.querySelector('.btn-feed-submit'); btn.innerText = '등록 중...'; btn.disabled = true;

        const feedDataJSON = JSON.stringify({ place: place, date: date, age: age, review: review });
        
        const fd = new URLSearchParams();
        fd.append('action', 'create');

        fd.append('password', currentLogPass || '0000');
        fd.append('content', feedDataJSON);

        fetch(scriptUrl, { method: 'POST', body: fd })
        .then(res => res.text())

            document.getElementById('feedPlace').value = ''; document.getElementById('feedDate').value = '';
            document.getElementById('feedAge').value = ''; document.getElementById('feedReview').value = '';

        .finally(()=>{ btn.innerText = '후기 공유하기 🚀'; btn.disabled = false; });
    }

                html += `
                    <div class="feed-card">
                        <div class="feed-header">
                            <div><span class="feed-author">👤 ${escapeHtml(f.nickname)}</span> <span class="feed-date">${dateStr}</span></div>
                            ${delBtn}
                        </div>
                        <div class="feed-details">
                            ${parsed.place ? `<p><b>📍 장소:</b> ${escapeHtml(parsed.place)}</p>` : ''}
                            ${parsed.date ? `<p><b>🗓️ 시기:</b> ${escapeHtml(parsed.date)}</p>` : ''}
                            ${parsed.age ? `<p><b>👶 연령:</b> ${escapeHtml(parsed.age)}</p>` : ''}
                            <p class="feed-review-text"><b>💡 꿀팁:</b><br>${nl2br(escapeHtml(parsed.review))}</p>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        });
    }

    function deleteFeed(reviewId) {
        if(!confirm("후기를 삭제하시겠습니까?")) return;
        const fd = new URLSearchParams(); fd.append('action', 'delete'); fd.append('eventId', 'GLOBAL_FEED'); fd.append('reviewId', reviewId); fd.append('password', currentLogPass);
        fetch(scriptUrl, { method: 'POST', body: fd }).catch(e => alert("오류 발생"));
    }

    // 초기 실행
    document.addEventListener('DOMContentLoaded', () => {
        initNotice(); initLastUpdated(); initVisitCounters(); fetchEventData();
    });

</script>
</body>
</html>
